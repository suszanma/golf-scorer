<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Golf Scorer"/>
<title>Match Play Scorer</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{background:#0f1a0f;color:#e8f5e8;font-family:Georgia,'Times New Roman',serif;min-height:100vh;font-size:16px}
input,button,select{font-family:Georgia,'Times New Roman',serif}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
button{cursor:pointer;background:none;border:none}
.screen{display:none}.screen.active{display:block}
/* Cards */
.card{background:#1c2a1c;border-radius:14px;border:1px solid #2a3d2a;overflow:hidden;margin-bottom:12px}
.card-header{padding:10px 16px;border-bottom:1px solid #2a3d2a;background:rgba(74,222,128,0.04);display:flex;align-items:center;justify-content:space-between}
.card-header span{font-size:11px;font-weight:700;color:#6b8f6b;letter-spacing:0.08em}
/* Inputs */
.score-input{width:44px;height:42px;border-radius:6px;font-size:16px;font-weight:700;text-align:center;outline:none;border:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.04);color:#9ab89a;font-family:Georgia,serif;-webkit-appearance:none}
.score-input:focus{border-color:rgba(74,222,128,0.4);background:rgba(74,222,128,0.08)}
/* Nav */
.topbar{position:sticky;top:0;z-index:20;background:#0f1a0f;border-bottom:1px solid #2a3d2a;padding:12px 16px 0}
.tabs{display:flex;gap:4px;margin-top:10px}
.tab-btn{flex:1;padding:9px 0;background:none;border:none;border-bottom:2px solid transparent;color:#6b8f6b;font-size:12px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;font-family:Georgia,serif}
.tab-btn.active{border-bottom-color:#4ade80;color:#4ade80}
/* Buttons */
.btn-primary{width:100%;padding:16px;background:linear-gradient(135deg,#22c55e,#16a34a);border:none;border-radius:12px;color:#fff;font-size:17px;font-weight:800;box-shadow:0 4px 24px rgba(34,197,94,0.3);font-family:Georgia,serif}
.btn-secondary{padding:14px;background:none;border:1px solid #2a3d2a;border-radius:12px;color:#6b8f6b;font-size:15px;font-weight:700;font-family:Georgia,serif}
/* Scorecard grid */
.sc-grid{display:grid;grid-template-columns:22px 24px 1fr 1fr 34px 1fr 1fr;gap:3px;padding:4px 2px;border-radius:6px;margin-bottom:2px;border:1px solid transparent}
.sc-header{display:grid;grid-template-columns:22px 24px 1fr 1fr 34px 1fr 1fr;gap:3px;margin-bottom:5px;padding:0 2px}
.sc-subtotal{display:grid;grid-template-columns:22px 24px 1fr 1fr 34px 1fr 1fr;gap:3px;padding:6px 2px 8px;border-radius:6px;background:rgba(74,222,128,0.04);border:1px solid #2a3d2a;margin-bottom:8px}
/* Team colors */
.dot-green{width:8px;height:8px;border-radius:50%;background:#4ade80;flex-shrink:0}
.dot-gold{width:8px;height:8px;border-radius:50%;background:#fbbf24;flex-shrink:0}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ─── Constants ────────────────────────────────────────────────────────────────
const DEFAULT_PARS = [4,4,3,4,5,3,4,4,5,4,3,4,5,4,3,4,4,5];
const DEFAULT_HCP  = [11,3,15,7,1,17,13,5,9,10,16,6,2,14,18,8,4,12];
const PCOLORS      = ["#4ade80","#fbbf24","#60a5fa","#f87171"];
const STORAGE_KEY  = "golf-scorer-v2";

// ─── State ────────────────────────────────────────────────────────────────────
let state = {
  screen: "setup",   // setup | home | scorecard
  setupStep: 0,      // 0=players, 1=rounds
  activeRound: 0,
  expandedRound: null,
  tab: "leaderboard",
  saveStatus: "idle",
  players: [
    {name:"Player 1",handicap:"10.4"},
    {name:"Player 2",handicap:"14.2"},
    {name:"Player 3",handicap:"8.1"},
    {name:"Player 4",handicap:"18.7"},
  ],
  rounds: mkRounds(),
  scores: mkScores(),
};

function mkRounds(){
  return [
    {label:"Round 1",courseRating:"72.0",courseSlope:"113",pair1:[0,1],pair2:[2,3],pars:[...DEFAULT_PARS],hcpIdx:[...DEFAULT_HCP]},
    {label:"Round 2",courseRating:"72.0",courseSlope:"113",pair1:[0,2],pair2:[1,3],pars:[...DEFAULT_PARS],hcpIdx:[...DEFAULT_HCP]},
    {label:"Round 3",courseRating:"72.0",courseSlope:"113",pair1:[0,3],pair2:[1,2],pars:[...DEFAULT_PARS],hcpIdx:[...DEFAULT_HCP]},
  ];
}
function mkScores(){
  return Array(3).fill(null).map(()=>Array(4).fill(null).map(()=>Array(18).fill("")));
}

// ─── Storage ──────────────────────────────────────────────────────────────────
let saveTimer = null;
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const saved = JSON.parse(raw);
    if(saved.players) state.players = saved.players;
    if(saved.rounds)  state.rounds  = saved.rounds;
    if(saved.scores)  state.scores  = saved.scores;
  }catch(e){}
}
function scheduleSave(){
  clearTimeout(saveTimer);
  state.saveStatus = "saving";
  renderSaveStatus();
  saveTimer = setTimeout(()=>{
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify({players:state.players,rounds:state.rounds,scores:state.scores}));
      state.saveStatus = "saved";
    }catch(e){ state.saveStatus = "error"; }
    renderSaveStatus();
    setTimeout(()=>{ state.saveStatus="idle"; renderSaveStatus(); }, 2000);
  }, 600);
}
function renderSaveStatus(){
  document.querySelectorAll(".save-status").forEach(el=>{
    if(state.saveStatus==="idle"){ el.textContent=""; return; }
    const cfg={saving:{t:"Saving…",c:"#6b8f6b"},saved:{t:"✓ Saved",c:"#4ade80"},error:{t:"⚠ Failed",c:"#f87171"}};
    const s=cfg[state.saveStatus];
    el.textContent=s.t; el.style.color=s.c;
  });
}

// ─── Handicap Logic ───────────────────────────────────────────────────────────
function calcCourseHcp(hcpIndex, slope, rating, totalPar){
  return Math.round((parseFloat(hcpIndex)||0)*((parseFloat(slope)||113)/113)+((parseFloat(rating)||totalPar)-totalPar));
}
function hcpStrokes(courseHcp, holeIdx){
  if(courseHcp<=0) return 0;
  const full=Math.floor(courseHcp);
  return (holeIdx<=full?1:0)+((courseHcp-full>0&&holeIdx===1)?1:0);
}
function netScore(gross, courseHcp, holeIdx){
  const g=parseInt(gross); if(isNaN(g)||gross==="") return null;
  return g - hcpStrokes(courseHcp, holeIdx);
}
function bestBall(roundScores, courseHcps, pair, hole, hcpIdx){
  const nets=pair.map(pi=>netScore(roundScores[pi][hole], courseHcps[pi], hcpIdx[hole]));
  const valid=nets.filter(n=>n!==null);
  return valid.length?Math.min(...valid):null;
}
function computeRound(ri){
  const r=state.rounds[ri], sc=state.scores[ri];
  const totalPar=r.pars.reduce((s,p)=>s+p,0);
  const courseHcps=state.players.map(p=>calcCourseHcp(p.handicap,r.courseSlope,r.courseRating,totalPar));
  let p1w=0,p2w=0,halves=0;
  const holes=[];
  for(let h=0;h<18;h++){
    const bb1=bestBall(sc,courseHcps,r.pair1,h,r.hcpIdx);
    const bb2=bestBall(sc,courseHcps,r.pair2,h,r.hcpIdx);
    let result=null;
    if(bb1!==null&&bb2!==null){
      if(bb1<bb2){result="p1";p1w++;}
      else if(bb2<bb1){result="p2";p2w++;}
      else{result="halve";halves++;}
    }
    holes.push({bb1,bb2,result,par:r.pars[h]});
  }
  const diff=p1w-p2w;
  const leader=diff>0?"p1":diff<0?"p2":"none";
  const matchStr=diff===0?"A/S":`${Math.abs(diff)} UP`;
  const done=holes.filter(h=>h.result!==null);
  const parDone=done.reduce((s,h)=>s+h.par,0);
  const p1net=done.reduce((s,h)=>h.bb1!==null?s+h.bb1:s,0);
  const p2net=done.reduce((s,h)=>h.bb2!==null?s+h.bb2:s,0);
  return{holes,p1w,p2w,halves,leader,matchStr,courseHcps,totalPar,
    p1diff:done.length?p1net-parDone:null,p2diff:done.length?p2net-parDone:null};
}
function computeOverall(){
  const pts=[0,0,0,0];
  const rounds=state.rounds.map((r,ri)=>{
    const rd=computeRound(ri);
    const has=r.pair1.some(pi=>state.scores[ri][pi].some(s=>s!==""))||r.pair2.some(pi=>state.scores[ri][pi].some(s=>s!==""));
    if(!has) return{...rd,w1:0,w2:0};
    let w1=0,w2=0;
    if(rd.leader==="p1") w1=2;
    else if(rd.leader==="p2") w2=2;
    else{w1=1;w2=1;}
    r.pair1.forEach(pi=>pts[pi]+=w1);
    r.pair2.forEach(pi=>pts[pi]+=w2);
    return{...rd,w1,w2};
  });
  return{pts,rounds};
}

// ─── Render helpers ───────────────────────────────────────────────────────────
function el(tag,attrs={},children=[]){
  const e=document.createElement(tag);
  for(const[k,v] of Object.entries(attrs)){
    if(k==="style"&&typeof v==="object") Object.assign(e.style,v);
    else if(k.startsWith("on")&&typeof v==="function") e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className") e.className=v;
    else e.setAttribute(k,v);
  }
  for(const c of children){
    if(c===null||c===undefined) continue;
    if(typeof c==="string"||typeof c==="number") e.appendChild(document.createTextNode(String(c)));
    else e.appendChild(c);
  }
  return e;
}
function div(attrs,children){ return el("div",attrs,children); }
function span(attrs,children){ return el("span",attrs,children); }
function btn(attrs,children){ return el("button",attrs,children); }
function inp(attrs){ return el("input",attrs,[]); }

function pcolor(i){ return PCOLORS[i]; }
function playerDot(i,size=10){
  return div({style:{width:size+"px",height:size+"px",borderRadius:"50%",background:pcolor(i),flexShrink:0}},[]);
}
function playerBadge(i){
  return div({style:{width:28,height:28,borderRadius:"50%",background:pcolor(i)+"20",
    border:`1.5px solid ${pcolor(i)}50`,display:"flex",alignItems:"center",justifyContent:"center",
    fontSize:12,fontWeight:800,color:pcolor(i),flexShrink:0}},[(i+1)+""])
}
function diffLabel(diff){
  if(diff===null) return span({style:{color:"#4b5563",fontSize:11}},["—"]);
  const color=diff<0?"#4ade80":diff===0?"#9ab89a":"#f97316";
  return span({style:{color,fontWeight:700,fontSize:11}},[diff>0?`+${diff}`:diff+""]);
}
function scoreInput(ri,pi,hi){
  const val=state.scores[ri][pi][hi];
  const par=state.rounds[ri].pars[hi];
  const v=parseInt(val);
  const diff=!isNaN(v)?v-par:null;
  let color="#9ab89a";
  if(diff!==null){
    if(diff<=-2) color="#fbbf24";
    else if(diff===-1) color="#4ade80";
    else if(diff===0) color="#e8f5e8";
    else if(diff===1) color="#f97316";
    else color="#ef4444";
  }
  const input=inp({type:"text",inputmode:"numeric",pattern:"[0-9]*",maxlength:"2",value:val,
    className:"score-input",style:{color,background:val?"rgba(74,222,128,0.08)":"rgba(255,255,255,0.04)",
      border:`1px solid ${val?"rgba(74,222,128,0.25)":"rgba(255,255,255,0.07)"}`}});
  input.addEventListener("input",e=>{
    const cleaned=e.target.value.replace(/[^0-9]/g,"");
    e.target.value=cleaned;
    state.scores[ri][pi][hi]=cleaned;
    scheduleSave();
    refreshScorecard();
  });
  return input;
}

// ─── Setup Screen ─────────────────────────────────────────────────────────────
function renderSetup(){
  const wrap=div({style:{minHeight:"100vh",background:"#0f1a0f"}},[]);

  // Mini topbar
  const topbar=div({style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px 0"}},[
    div({style:{display:"flex",alignItems:"center",gap:6}},[
      span({style:{fontSize:13,color:"#6b8f6b",fontWeight:700}},["⛳ Match Play Scorer"]),
      span({className:"save-status",style:{fontSize:10,fontWeight:700,marginLeft:6}},[]),
    ]),
    btn({style:{border:"1px solid rgba(239,68,68,0.3)",borderRadius:6,color:"#f87171",fontSize:10,fontWeight:700,padding:"3px 8px"},
      onClick:handleReset},["Reset"]),
  ]);
  wrap.appendChild(topbar);

  if(state.setupStep===0){
    const inner=div({style:{padding:"28px 16px",maxWidth:480,margin:"0 auto"}},[]);
    inner.appendChild(div({style:{textAlign:"center",marginBottom:32}},[
      div({style:{fontSize:44,marginBottom:10}},["⛳"]),
      el("h1",{style:{fontSize:28,fontWeight:900,color:"#4ade80",letterSpacing:"-0.03em",marginBottom:6}},["Match Play Scorer"]),
      el("p",{style:{color:"#6b8f6b",fontSize:13}},["Step 1 of 2 — Players"]),
    ]));

    // Players card
    const card=div({className:"card",style:{marginBottom:28}},[]);
    card.appendChild(div({className:"card-header"},[span({},[" PLAYERS & HANDICAP INDEX"])]));
    state.players.forEach((p,i)=>{
      const row=div({style:{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",
        borderBottom:i<3?"1px solid #1a271a":"none"}},[]);
      row.appendChild(playerBadge(i));
      const nameIn=inp({type:"text",value:p.name,placeholder:`Player ${i+1}`,
        style:{flex:1,background:"transparent",border:"none",color:"#e8f5e8",fontSize:15,fontWeight:600,outline:"none"}});
      nameIn.addEventListener("input",e=>{state.players[i].name=e.target.value;scheduleSave();});
      row.appendChild(nameIn);
      row.appendChild(span({style:{fontSize:11,color:"#6b8f6b",marginRight:2}},["HCP"]));
      const hcpIn=inp({type:"number",step:"0.1",min:"0",max:"54",value:p.handicap,
        style:{width:56,height:34,background:"rgba(255,255,255,0.05)",border:"1px solid #2a3d2a",
          borderRadius:6,color:"#4ade80",fontSize:14,fontWeight:700,textAlign:"center",outline:"none"}});
      hcpIn.addEventListener("input",e=>{state.players[i].handicap=e.target.value;scheduleSave();});
      row.appendChild(hcpIn);
      card.appendChild(row);
    });
    inner.appendChild(card);

    const nextBtn=el("button",{className:"btn-primary",onClick:()=>{state.setupStep=1;renderApp();}},["Next: Configure Rounds →"]);
    inner.appendChild(nextBtn);
    wrap.appendChild(inner);
  } else {
    const inner=div({style:{padding:"20px 16px",maxWidth:520,margin:"0 auto"}},[]);
    inner.appendChild(div({style:{textAlign:"center",marginBottom:20}},[
      el("p",{style:{color:"#6b8f6b",fontSize:13,marginBottom:4}},["Step 2 of 2 — Rounds"]),
      el("p",{style:{color:"#4b5563",fontSize:11}},["Set course name, pairings, par & hole handicap index"]),
    ]));

    state.rounds.forEach((r,ri)=>{
      const rcard=div({className:"card",style:{marginBottom:14}},[]);

      // Round header
      const rhead=div({style:{padding:"12px 16px",borderBottom:"1px solid #2a3d2a",
        background:"rgba(74,222,128,0.04)",display:"flex",alignItems:"center",gap:10}},[]);
      const labelIn=inp({type:"text",value:r.label,placeholder:"Course / Round Name",
        style:{flex:1,background:"transparent",border:"none",color:"#e8f5e8",fontSize:15,fontWeight:800,outline:"none"}});
      labelIn.addEventListener("input",e=>{state.rounds[ri].label=e.target.value;scheduleSave();});
      rhead.appendChild(labelIn);
      const editBtn=btn({style:{border:"1px solid #2a3d2a",borderRadius:6,color:"#6b8f6b",fontSize:11,fontWeight:700,padding:"4px 10px"},
        onClick:()=>{state.expandedRound=state.expandedRound===ri?null:ri;renderApp();}},
        [state.expandedRound===ri?"Collapse ▲":"Edit ▼"]);
      rhead.appendChild(editBtn);
      rcard.appendChild(rhead);

      // Pairing preview
      const prev=div({style:{display:"flex",gap:8,padding:"10px 16px",
        borderBottom:state.expandedRound===ri?"1px solid #2a3d2a":"none"}},[]);
      [r.pair1,r.pair2].forEach((pair,pi)=>{
        const box=div({style:{flex:1,padding:"7px 10px",borderRadius:8,
          background:pi===0?"rgba(74,222,128,0.06)":"rgba(251,191,36,0.06)",
          border:`1px solid ${pi===0?"rgba(74,222,128,0.2)":"rgba(251,191,36,0.2)"}`}},[]);
        pair.forEach(idx=>{
          box.appendChild(div({style:{fontSize:12,fontWeight:700,color:pcolor(idx),lineHeight:1.5}},[state.players[idx]?.name||`P${idx+1}`]));
        });
        prev.appendChild(box);
      });
      rcard.appendChild(prev);

      if(state.expandedRound===ri){
        // Pairings section
        rcard.appendChild(div({style:{padding:"8px 16px",background:"rgba(74,222,128,0.03)",borderBottom:"1px solid #1a271a"}},[
          span({style:{fontSize:11,fontWeight:700,color:"#6b8f6b",letterSpacing:"0.06em"}},["PAIRINGS"])
        ]));

        const slots=[
          {team:0,idx:0,label:"Team A — Player 1",color:"#4ade80"},
          {team:0,idx:1,label:"Team A — Player 2",color:"#4ade80"},
          {team:1,idx:0,label:"Team B — Player 1",color:"#fbbf24"},
          {team:1,idx:1,label:"Team B — Player 2",color:"#fbbf24"},
        ];
        slots.forEach((s,si)=>{
          const current=s.team===0?r.pair1[s.idx]:r.pair2[s.idx];
          const row=div({style:{padding:"10px 16px",borderBottom:"1px solid #1a271a",
            display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}},[]);
          row.appendChild(div({style:{width:8,height:8,borderRadius:"50%",background:s.color,flexShrink:0}},[]))
          row.appendChild(span({style:{fontSize:12,color:"#6b8f6b",minWidth:140}},[s.label]));
          const btns=div({style:{display:"flex",gap:6,flexWrap:"wrap"}},[]);
          state.players.forEach((p,pi)=>{
            const isSel=current===pi;
            const pb=btn({
              style:{padding:"5px 11px",borderRadius:6,fontSize:12,fontWeight:700,
                background:isSel?pcolor(pi)+"30":"rgba(255,255,255,0.07)",
                color:isSel?pcolor(pi):"#6b8f6b",
                outline:isSel?`1.5px solid ${pcolor(pi)}60`:"1px solid rgba(255,255,255,0.1)"},
              onClick:()=>{ setPairingSlot(ri,s.team,s.idx,pi); renderApp(); }
            },[p.name||`P${pi+1}`]);
            btns.appendChild(pb);
          });
          row.appendChild(btns);
          rcard.appendChild(row);
        });

        const allUnique=new Set([...r.pair1,...r.pair2]).size===4;
        if(!allUnique){
          rcard.appendChild(div({style:{padding:"8px 16px",background:"rgba(251,191,36,0.08)",borderTop:"1px solid #1a271a"}},[
            span({style:{fontSize:11,color:"#fbbf24"}},["⚠ Each player must appear exactly once."])
          ]));
        }

        // Course setup
        rcard.appendChild(div({style:{padding:"8px 16px",background:"rgba(96,165,250,0.03)",
          borderTop:"1px solid #1a271a",borderBottom:"1px solid #1a271a"}},[
          span({style:{fontSize:11,fontWeight:700,color:"#6b8f6b",letterSpacing:"0.06em"}},["COURSE SETUP"])
        ]));

        const totalPar=r.pars.reduce((s,p)=>s+p,0);
        const courseRow=div({style:{padding:"12px 16px",borderBottom:"1px solid #1a271a",
          display:"flex",gap:14,flexWrap:"wrap",alignItems:"center"}},[]);
        [["Rating",r.courseRating,"courseRating","0.1",58],
         ["Slope",r.courseSlope,"courseSlope","1",54]].forEach(([lbl,val,field,step,w])=>{
          const g=div({style:{display:"flex",alignItems:"center",gap:6}},[]);
          g.appendChild(span({style:{fontSize:11,color:"#6b8f6b"}},[lbl]));
          const si=inp({type:"number",step,value:val,
            style:{width:w+"px",height:30,background:"rgba(255,255,255,0.05)",border:"1px solid #2a3d2a",
              borderRadius:6,color:"#4ade80",fontSize:13,fontWeight:700,textAlign:"center",outline:"none"}});
          si.addEventListener("input",e=>{state.rounds[ri][field]=e.target.value;scheduleSave();});
          g.appendChild(si);
          courseRow.appendChild(g);
        });
        courseRow.appendChild(div({style:{display:"flex",alignItems:"center",gap:6}},[
          span({style:{fontSize:11,color:"#6b8f6b"}},["Total Par"]),
          span({style:{fontSize:13,fontWeight:700,color:"#9ab89a"}},[totalPar+""]),
        ]));
        rcard.appendChild(courseRow);

        // Hole grid
        const grid=div({style:{padding:"10px 14px",overflowX:"auto"}},[]);
        [0,1].forEach(half=>{
          const hdr=div({style:{display:"grid",gridTemplateColumns:"30px repeat(9,1fr)",gap:3,marginBottom:3}},[
            span({},[]),
            ...Array.from({length:9},(_,i)=>span({style:{fontSize:10,color:"#6b8f6b",textAlign:"center",fontWeight:700}},[(half*9+i+1)+""]))
          ]);
          grid.appendChild(hdr);
          [["PAR",r.pars,(h,v)=>{state.rounds[ri].pars[half*9+h]=parseInt(v)||state.rounds[ri].pars[half*9+h];scheduleSave();},"#9ab89a"],
           ["HCP",r.hcpIdx,(h,v)=>{state.rounds[ri].hcpIdx[half*9+h]=parseInt(v)||state.rounds[ri].hcpIdx[half*9+h];scheduleSave();},"#60a5fa"]
          ].forEach(([lbl,vals,fn,col])=>{
            const row=div({style:{display:"grid",gridTemplateColumns:"30px repeat(9,1fr)",gap:3,marginBottom:3}},[
              span({style:{fontSize:9,color:"#6b8f6b",textAlign:"center",alignSelf:"center",fontWeight:700}},[lbl])
            ]);
            vals.slice(half*9,half*9+9).forEach((v,i)=>{
              const gi=inp({type:"number",value:v+"",
                style:{width:"100%",height:28,background:"rgba(255,255,255,0.04)",border:"1px solid #2a3d2a",
                  borderRadius:5,color:col,fontSize:12,fontWeight:700,textAlign:"center",outline:"none"}});
              gi.addEventListener("input",e=>fn(i,e.target.value));
              row.appendChild(gi);
            });
            grid.appendChild(row);
          });
          if(half===0) grid.appendChild(div({style:{height:6}},[]));
        });
        grid.appendChild(div({style:{padding:"6px 8px",background:"rgba(96,165,250,0.06)",borderRadius:6,
          border:"1px solid rgba(96,165,250,0.15)",marginTop:4}},[
          span({style:{fontSize:10,color:"#60a5fa"}},["HCP = Hole handicap index (1–18, 1 = hardest)"])
        ]));
        rcard.appendChild(grid);
      }

      inner.appendChild(rcard);
    });

    const btnRow=div({style:{display:"flex",gap:10,marginBottom:24}},[
      btn({className:"btn-secondary",style:{flex:1},onClick:()=>{state.setupStep=0;renderApp();}},["← Back"]),
      btn({className:"btn-primary",style:{flex:2,width:"auto",padding:"14px"},onClick:()=>{state.screen="home";renderApp();}},["Start Tournament →"]),
    ]);
    inner.appendChild(btnRow);
    wrap.appendChild(inner);
  }

  return wrap;
}

function setPairingSlot(ri,team,slotIdx,playerIdx){
  const r=state.rounds[ri];
  let p1=[...r.pair1],p2=[...r.pair2];
  const inP1=p1.indexOf(playerIdx),inP2=p2.indexOf(playerIdx);
  const displaced=team===0?p1[slotIdx]:p2[slotIdx];
  if(inP1!==-1) p1[inP1]=displaced;
  if(inP2!==-1) p2[inP2]=displaced;
  if(team===0) p1[slotIdx]=playerIdx; else p2[slotIdx]=playerIdx;
  state.rounds[ri].pair1=p1; state.rounds[ri].pair2=p2;
  scheduleSave();
}

// ─── Home / Leaderboard ───────────────────────────────────────────────────────
function renderHome(){
  const wrap=div({style:{minHeight:"100vh",background:"#0f1a0f"}},[]);

  // Topbar
  const topbar=div({className:"topbar"},[]);
  const toprow=div({style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}},[]);
  toprow.appendChild(div({style:{display:"flex",alignItems:"center",gap:8}},[
    span({style:{fontSize:20}},["⛳"]),
    div({},[
      div({style:{display:"flex",alignItems:"center",gap:6}},[
        div({style:{fontSize:15,fontWeight:800,color:"#4ade80"}},["Match Play Scorer"]),
        span({className:"save-status",style:{fontSize:10,fontWeight:700,marginLeft:6}},[]),
      ]),
      div({style:{fontSize:11,color:"#6b8f6b"}},["Round Robin · Best Ball"]),
    ]),
  ]));
  const rbtnRow=div({style:{display:"flex",gap:6,alignItems:"center"}},[]);
  rbtnRow.appendChild(btn({style:{border:"1px solid rgba(239,68,68,0.3)",borderRadius:6,color:"#f87171",fontSize:10,fontWeight:700,padding:"3px 8px"},onClick:handleReset},["Reset"]));
  rbtnRow.appendChild(btn({style:{border:"1px solid #2a3d2a",borderRadius:6,color:"#6b8f6b",fontSize:11,padding:"4px 10px"},onClick:()=>{state.screen="setup";state.setupStep=0;renderApp();}},["Setup"]));
  toprow.appendChild(rbtnRow);
  topbar.appendChild(toprow);

  const tabs=div({className:"tabs"},[]);
  ["leaderboard","rounds"].forEach(t=>{
    const tb=btn({className:"tab-btn"+(state.tab===t?" active":""),onClick:()=>{state.tab=t;renderApp();}},
      [t.charAt(0).toUpperCase()+t.slice(1)]);
    tabs.appendChild(tb);
  });
  topbar.appendChild(tabs);
  wrap.appendChild(topbar);

  if(state.tab==="leaderboard") wrap.appendChild(renderLeaderboard());
  else wrap.appendChild(renderRoundsList());
  return wrap;
}

function renderLeaderboard(){
  const {pts,rounds:rds}=computeOverall();
  const ranked=[...state.players.map((p,i)=>({...p,idx:i,pts:pts[i]}))].sort((a,b)=>b.pts-a.pts);
  const wrap=div({style:{padding:"16px",maxWidth:500,margin:"0 auto"}},[]);

  wrap.appendChild(div({style:{textAlign:"center",marginBottom:20}},[
    div({style:{fontSize:11,fontWeight:700,color:"#6b8f6b",letterSpacing:"0.08em",marginBottom:4}},["OVERALL STANDINGS"]),
    div({style:{fontSize:11,color:"#4b5563"}},["Win = 2 pts · Halve = 1 pt · Loss = 0 pts"]),
  ]));

  const card=div({className:"card",style:{marginBottom:24}},[]);
  ranked.forEach((p,rank)=>{
    const isLead=rank===0&&p.pts>0;
    const row=div({style:{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",
      borderBottom:rank<3?"1px solid #1a271a":"none",
      background:isLead?"rgba(251,191,36,0.03)":"transparent"}},[]);
    row.appendChild(div({style:{width:26,height:26,borderRadius:"50%",flexShrink:0,
      background:isLead?"rgba(251,191,36,0.2)":"rgba(255,255,255,0.04)",
      display:"flex",alignItems:"center",justifyContent:"center",
      fontSize:13,fontWeight:800,color:isLead?"#fbbf24":"#6b8f6b"}},[(rank+1)+""]))
    row.appendChild(playerDot(p.idx));
    row.appendChild(div({style:{flex:1}},[
      div({style:{fontSize:15,fontWeight:700,color:"#e8f5e8"}},[p.name]),
      div({style:{fontSize:11,color:"#6b8f6b"}},["HCP "+p.handicap]),
    ]));
    // Round point tiles
    const tiles=div({style:{display:"flex",gap:4}},[]);
    state.rounds.forEach((r,ri)=>{
      const has=r.pair1.some(pi=>state.scores[ri][pi].some(s=>s!==""))||r.pair2.some(pi=>state.scores[ri][pi].some(s=>s!==""));
      const isp1=r.pair1.includes(p.idx),isp2=r.pair2.includes(p.idx);
      let tpts=null;
      if(has&&(isp1||isp2)) tpts=isp1?rds[ri].w1:rds[ri].w2;
      const tc=tpts===2?"rgba(74,222,128,0.15)":tpts===1?"rgba(148,163,184,0.1)":tpts===0&&tpts!==null?"rgba(239,68,68,0.1)":"rgba(255,255,255,0.04)";
      const bc=tpts===2?"rgba(74,222,128,0.3)":tpts===1?"rgba(148,163,184,0.2)":tpts===0&&tpts!==null?"rgba(239,68,68,0.2)":"rgba(255,255,255,0.06)";
      const fc=tpts===2?"#4ade80":tpts===1?"#94a3b8":tpts===0&&tpts!==null?"#f87171":"#4b5563";
      tiles.appendChild(div({style:{width:22,height:22,borderRadius:4,background:tc,border:`1px solid ${bc}`,
        display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:fc}},
        [tpts!==null?tpts+"":"·"]));
    });
    row.appendChild(tiles);
    row.appendChild(div({style:{textAlign:"right",minWidth:40}},[
      div({style:{fontSize:26,fontWeight:900,color:pcolor(p.idx),lineHeight:1}},[(p.pts)+""]),
      div({style:{fontSize:10,color:"#6b8f6b"}},["pts"]),
    ]));
    card.appendChild(row);
  });
  wrap.appendChild(card);

  wrap.appendChild(div({style:{fontSize:11,fontWeight:700,color:"#6b8f6b",letterSpacing:"0.08em",marginBottom:10}},["ROUND RESULTS"]));
  state.rounds.forEach((r,ri)=>{
    const rd=rds[ri];
    const has=r.pair1.some(pi=>state.scores[ri][pi].some(s=>s!==""));
    const rc=div({className:"card",style:{marginBottom:10}},[]);
    const rh=div({style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",
      borderBottom:"1px solid #1a271a",background:"rgba(74,222,128,0.03)"}},[]);
    rh.appendChild(div({},[
      div({style:{fontSize:13,fontWeight:700,color:"#e8f5e8"}},[r.label]),
      div({style:{fontSize:10,color:"#4b5563"}},["Rating "+r.courseRating+" · Slope "+r.courseSlope]),
    ]));
    rh.appendChild(btn({style:{background:"rgba(74,222,128,0.1)",border:"1px solid rgba(74,222,128,0.2)",borderRadius:6,
      color:"#4ade80",fontSize:11,fontWeight:700,padding:"4px 10px"},
      onClick:()=>{state.activeRound=ri;state.screen="scorecard";renderApp();}},
      [has?"Edit":"Score"]));
    rc.appendChild(rh);
    const rb=div({style:{padding:"12px 14px"}},[]);
    [r.pair1,r.pair2].forEach((pair,pi)=>{
      const pr=div({style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:pi===0?6:0}},[]);
      const pnames=div({style:{flex:1}},[]);
      pair.forEach(idx=>pnames.appendChild(span({style:{fontSize:13,fontWeight:600,color:pcolor(idx),marginRight:6}},[state.players[idx].name.split(" ")[0]])));
      pr.appendChild(pnames);
      const pright=div({style:{display:"flex",alignItems:"center",gap:8}},[]);
      if(has) pright.appendChild(diffLabel(pi===0?rd.p1diff:rd.p2diff));
      const won=has?(pi===0?rd.p1w:rd.p2w):null;
      const isWin=has&&rd.leader===(pi===0?"p1":"p2");
      pright.appendChild(span({style:{fontSize:18,fontWeight:900,width:22,textAlign:"right",color:isWin?pi===0?"#4ade80":"#fbbf24":"#6b8f6b"}},[won!==null?won+"":"—"]));
      pr.appendChild(pright);
      rb.appendChild(pr);
    });
    if(has){
      rb.appendChild(div({style:{marginTop:8,paddingTop:8,borderTop:"1px solid #1a271a",display:"flex",justifyContent:"space-between"}},[
        span({style:{fontSize:11,color:"#6b8f6b"}},[rd.halves+" holes halved"]),
        span({style:{fontSize:12,fontWeight:700,color:rd.leader==="none"?"#94a3b8":rd.leader==="p1"?"#4ade80":"#fbbf24"}},[rd.leader==="none"?"All Square":rd.matchStr]),
      ]));
    }
    rc.appendChild(rb);
    wrap.appendChild(rc);
  });
  return wrap;
}

function renderRoundsList(){
  const wrap=div({style:{padding:"16px",maxWidth:500,margin:"0 auto"}},[]);
  state.rounds.forEach((r,ri)=>{
    const rd=computeRound(ri);
    const has=r.pair1.some(pi=>state.scores[ri][pi].some(s=>s!==""));
    const rb=btn({style:{display:"block",width:"100%",textAlign:"left",background:"#1c2a1c",
      border:"1px solid #2a3d2a",borderRadius:14,padding:"16px",marginBottom:12,color:"#e8f5e8"},
      onClick:()=>{state.activeRound=ri;state.screen="scorecard";renderApp();}});
    const rh=div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},[]);
    rh.appendChild(div({},[
      div({style:{fontSize:15,fontWeight:800}},[r.label]),
      div({style:{fontSize:10,color:"#4b5563"}},["Rating "+r.courseRating+" · Slope "+r.courseSlope]),
    ]));
    if(has){
      rh.appendChild(span({style:{fontSize:12,fontWeight:700,color:rd.leader==="none"?"#94a3b8":rd.leader==="p1"?"#4ade80":"#fbbf24"}},
        [rd.leader==="none"?"A/S":rd.matchStr]));
    } else {
      rh.appendChild(span({style:{fontSize:11,color:"#4ade80",background:"rgba(74,222,128,0.1)",padding:"3px 8px",borderRadius:5}},["Not Started"]));
    }
    rb.appendChild(rh);
    const pairs=div({style:{display:"flex",gap:8}},[]);
    [r.pair1,r.pair2].forEach((pair,pi)=>{
      const pb=div({style:{flex:1,padding:"8px 10px",borderRadius:8,
        background:pi===0?"rgba(74,222,128,0.05)":"rgba(251,191,36,0.05)",
        border:`1px solid ${pi===0?"rgba(74,222,128,0.15)":"rgba(251,191,36,0.15)"}`}},[]);
      pair.forEach(idx=>pb.appendChild(div({style:{fontSize:12,fontWeight:600,color:pcolor(idx)}},[state.players[idx].name])));
      if(has) pb.appendChild(div({style:{fontSize:11,color:"#6b8f6b",marginTop:3}},[(pi===0?rd.p1w:rd.p2w)+" holes won"]));
      pairs.appendChild(pb);
    });
    rb.appendChild(pairs);
    wrap.appendChild(rb);
  });
  return wrap;
}

// ─── Scorecard ────────────────────────────────────────────────────────────────
let scorecardRoot = null;

function renderScorecard(){
  const ri=state.activeRound;
  const r=state.rounds[ri];
  const wrap=div({style:{minHeight:"100vh",background:"#0f1a0f"}},[]);
  scorecardRoot=wrap;

  const scInner=div({style:{maxWidth:520,margin:"0 auto"}},[]);
  scInner.appendChild(buildScorecardContent(ri));
  wrap.appendChild(scInner);
  return wrap;
}

function buildScorecardContent(ri){
  const r=state.rounds[ri];
  const rd=computeRound(ri);
  const pairs=[r.pair1,r.pair2];

  const root=div({},[]);

  // Sticky header
  const head=div({style:{position:"sticky",top:0,zIndex:10,background:"#0f1a0f",
    borderBottom:"1px solid #2a3d2a",padding:"12px 14px 10px"}},[]);
  const htop=div({style:{display:"flex",alignItems:"center",gap:10,marginBottom:10}},[]);
  htop.appendChild(btn({style:{color:"#6b8f6b",fontSize:22,padding:0,lineHeight:1},
    onClick:()=>{state.screen="home";renderApp();}},["←"]));
  htop.appendChild(div({style:{flex:1}},[
    div({style:{fontSize:16,fontWeight:800,color:"#e8f5e8"}},[r.label]),
    div({style:{fontSize:11,color:"#6b8f6b"}},["Rating "+r.courseRating+" · Slope "+r.courseSlope+" · Par "+rd.totalPar]),
  ]));
  const diff=rd.p1w-rd.p2w;
  const sLabel=diff===0&&rd.p1w===0?"Not Started":diff===0?"All Square":`${(diff>0?r.pair1:r.pair2).map(i=>state.players[i].name.split(" ")[0]).join(" & ")} ${Math.abs(diff)} UP`;
  const sColor=diff===0&&rd.p1w===0?"#6b8f6b":diff===0?"#94a3b8":diff>0?"#4ade80":"#fbbf24";
  htop.appendChild(div({style:{fontSize:13,fontWeight:700,color:sColor,textAlign:"right"}},[sLabel]));
  head.appendChild(htop);

  const pairBoxes=div({style:{display:"flex",gap:6}},[]);
  pairs.forEach((pair,pi)=>{
    const pb=div({style:{flex:1,padding:"7px 10px",borderRadius:8,
      background:pi===0?"rgba(74,222,128,0.07)":"rgba(251,191,36,0.07)",
      border:`1px solid ${pi===0?"rgba(74,222,128,0.2)":"rgba(251,191,36,0.2)"}`}},[]);
    pair.forEach(idx=>pb.appendChild(div({style:{fontSize:12,fontWeight:700,color:pcolor(idx),lineHeight:1.5}},[
      state.players[idx].name+" ",
      el("span",{style:{fontWeight:400,color:"#6b8f6b",fontSize:10}},["(cHCP "+rd.courseHcps[idx]+")"]),
    ])));
    pairBoxes.appendChild(pb);
  });
  head.appendChild(pairBoxes);
  root.appendChild(head);

  // Grid
  const body=div({style:{padding:"10px 12px"}},[]);

  // Column headers
  const hdr=div({className:"sc-header"},[
    span({style:{fontSize:9,color:"#6b8f6b",textAlign:"center",fontWeight:700}},["H"]),
    span({style:{fontSize:9,color:"#6b8f6b",textAlign:"center",fontWeight:700}},["PAR"]),
    ...pairs[0].map(pi=>span({style:{fontSize:9,color:pcolor(pi),textAlign:"center",fontWeight:800}},[state.players[pi].name.split(" ")[0].slice(0,5)])),
    span({style:{fontSize:9,color:"#6b8f6b",textAlign:"center",fontWeight:700}},["RES"]),
    ...pairs[1].map(pi=>span({style:{fontSize:9,color:pcolor(pi),textAlign:"center",fontWeight:800}},[state.players[pi].name.split(" ")[0].slice(0,5)])),
  ]);
  body.appendChild(hdr);

  [0,1].forEach(half=>{
    for(let i=0;i<9;i++){
      const h=half*9+i;
      const hd=rd.holes[h];
      const bg=hd.result==="p1"?"rgba(74,222,128,0.06)":hd.result==="p2"?"rgba(251,191,36,0.06)":hd.result==="halve"?"rgba(148,163,184,0.04)":"transparent";
      const br=hd.result==="p1"?"rgba(74,222,128,0.15)":hd.result==="p2"?"rgba(251,191,36,0.15)":hd.result==="halve"?"rgba(148,163,184,0.1)":"transparent";
      const row=div({className:"sc-grid",style:{background:bg,borderColor:br}},[
        div({style:{textAlign:"center",alignSelf:"center"}},[
          div({style:{fontSize:11,fontWeight:700,color:"#6b8f6b"}},[(h+1)+""]),
          div({style:{fontSize:8,color:"#4b5563"}},[r.hcpIdx[h]+""]),
        ]),
        div({style:{textAlign:"center",fontSize:12,fontWeight:700,color:"#9ab89a",alignSelf:"center"}},[r.pars[h]+""]),
        ...pairs[0].map(pi=>div({style:{display:"flex",justifyContent:"center"}},[scoreInput(ri,pi,h)])),
        div({style:{textAlign:"center",alignSelf:"center"}},[
          hd.result?span({style:{fontSize:11,fontWeight:800,color:hd.result==="p1"?"#4ade80":hd.result==="p2"?"#fbbf24":"#94a3b8"}},[hd.result==="halve"?"½":"W"]):
          span({style:{color:"#2a3d2a",fontSize:10}},["·"]),
        ]),
        ...pairs[1].map(pi=>div({style:{display:"flex",justifyContent:"center"}},[scoreInput(ri,pi,h)])),
      ]);
      body.appendChild(row);
    }

    // Subtotals
    const sub=div({className:"sc-subtotal"},[
      div({style:{gridColumn:"1/3",textAlign:"center",fontSize:11,fontWeight:800,color:"#6b8f6b",alignSelf:"center"}},[half===0?"OUT":"IN"]),
    ]);
    pairs[0].forEach(pi=>{
      const sl=state.scores[ri][pi].slice(half*9,half*9+9);
      const gross=sl.reduce((s,v)=>s+(parseInt(v)||0),0);
      const net=sl.reduce((s,v,i)=>{const n=netScore(v,rd.courseHcps[pi],r.hcpIdx[half*9+i]);return n!==null?s+n:s;},0);
      const has=sl.some(v=>v!=="");
      sub.appendChild(div({style:{textAlign:"center",fontSize:13,fontWeight:800,color:"#e8f5e8",alignSelf:"center"}},[
        has?gross+"":"—",
        has?el("span",{style:{fontSize:9,color:"#6b8f6b"}},{},["("+net+")"]):null,
      ].filter(Boolean)));
    });
    const p1h=rd.holes.slice(half*9,half*9+9).filter(h=>h.result==="p1").length;
    const p2h=rd.holes.slice(half*9,half*9+9).filter(h=>h.result==="p2").length;
    sub.appendChild(div({style:{textAlign:"center",fontSize:11,fontWeight:700,color:"#6b8f6b",alignSelf:"center"}},[p1h+"-"+p2h]));
    pairs[1].forEach(pi=>{
      const sl=state.scores[ri][pi].slice(half*9,half*9+9);
      const gross=sl.reduce((s,v)=>s+(parseInt(v)||0),0);
      const net=sl.reduce((s,v,i)=>{const n=netScore(v,rd.courseHcps[pi],r.hcpIdx[half*9+i]);return n!==null?s+n:s;},0);
      const has=sl.some(v=>v!=="");
      sub.appendChild(div({style:{textAlign:"center",fontSize:13,fontWeight:800,color:"#e8f5e8",alignSelf:"center"}},[
        has?gross+"":"—",
        has?el("span",{style:{fontSize:9,color:"#6b8f6b"}},["("+net+")"]):null,
      ].filter(Boolean)));
    });
    body.appendChild(sub);
  });

  // Match summary
  const summary=div({style:{padding:"14px",background:"rgba(74,222,128,0.05)",borderRadius:12,border:"1px solid #2a3d2a"}},[]);
  summary.appendChild(div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},[
    span({style:{fontSize:11,fontWeight:700,color:"#6b8f6b"}},["MATCH RESULT"]),
    span({style:{fontSize:14,fontWeight:800,color:sColor}},[sLabel]),
  ]));
  const sg=div({style:{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:8,alignItems:"center"}},[]);
  [[r.pair1,"#4ade80",rd.p1w,rd.p1diff],[r.pair2,"#fbbf24",rd.p2w,rd.p2diff]].forEach(([pair,col,won,pdiff],pi)=>{
    sg.appendChild(div({style:{textAlign:"center"}},[
      div({style:{fontSize:11,color:col,marginBottom:3}},[pair.map(i=>state.players[i].name.split(" ")[0]).join(" & ")]),
      div({style:{fontSize:24,fontWeight:900,color:col,lineHeight:1}},[won+""]),
      div({style:{fontSize:11,color:"#6b8f6b",marginTop:2}},[diffLabel(pdiff)," net"]),
    ]));
    if(pi===0) sg.appendChild(div({style:{textAlign:"center"}},[
      div({style:{fontSize:12,color:"#4b5563"}},["vs"]),
      div({style:{fontSize:10,color:"#4b5563",marginTop:2}},[rd.halves+" halved"]),
    ]));
  });
  summary.appendChild(sg);
  body.appendChild(summary);
  root.appendChild(body);
  return root;
}

// Store sColor/sLabel for match summary reuse
let sColor="#6b8f6b",sLabel="Not Started";

function refreshScorecard(){
  if(state.screen!=="scorecard"||!scorecardRoot) return;
  const ri=state.activeRound;
  const inner=scorecardRoot.querySelector("div");
  if(inner){ inner.innerHTML=""; inner.appendChild(buildScorecardContent(ri)); }
}

// ─── Reset ────────────────────────────────────────────────────────────────────
function handleReset(){
  if(!confirm("Reset all tournament data? This cannot be undone.")) return;
  try{localStorage.removeItem(STORAGE_KEY);}catch(e){}
  state.players=[{name:"Player 1",handicap:"10.4"},{name:"Player 2",handicap:"14.2"},{name:"Player 3",handicap:"8.1"},{name:"Player 4",handicap:"18.7"}];
  state.rounds=mkRounds();
  state.scores=mkScores();
  state.screen="setup";
  state.setupStep=0;
  state.saveStatus="idle";
  renderApp();
}

// ─── Main render ──────────────────────────────────────────────────────────────
function renderApp(){
  const app=document.getElementById("app");
  app.innerHTML="";
  let content;
  if(state.screen==="setup") content=renderSetup();
  else if(state.screen==="scorecard") content=renderScorecard();
  else content=renderHome();
  app.appendChild(content);
  renderSaveStatus();
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
loadState();
renderApp();
</script>
