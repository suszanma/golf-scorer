<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Guest Scorer"/>
<title>Guest Golf Scorer</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{background:#0f1a0f;color:#e8f5e8;font-family:Georgia,'Times New Roman',serif;min-height:100vh;font-size:16px}
input,button{font-family:Georgia,'Times New Roman',serif}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
button{cursor:pointer;background:none;border:none}
.card{background:#1c2a1c;border-radius:14px;border:1px solid #2a3d2a;overflow:hidden;margin-bottom:12px}
.card-header{padding:10px 16px;border-bottom:1px solid #2a3d2a;background:rgba(74,222,128,0.04);display:flex;align-items:center;justify-content:space-between}
.card-header span{font-size:11px;font-weight:700;color:#6b8f6b;letter-spacing:0.08em}
.score-input{width:44px;height:42px;border-radius:6px;font-size:16px;font-weight:700;text-align:center;outline:none;border:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.04);color:#9ab89a;font-family:Georgia,serif;-webkit-appearance:none}
.score-input:focus{border-color:rgba(74,222,128,0.4);background:rgba(74,222,128,0.08)}
.topbar{position:sticky;top:0;z-index:20;background:#0f1a0f;border-bottom:1px solid #2a3d2a;padding:12px 16px 0}
.tabs{display:flex;gap:4px;margin-top:10px}
.tab-btn{flex:1;padding:9px 0;background:none;border:none;border-bottom:2px solid transparent;color:#6b8f6b;font-size:12px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;font-family:Georgia,serif}
.tab-btn.active{border-bottom-color:#4ade80;color:#4ade80}
.btn-primary{width:100%;padding:16px;background:linear-gradient(135deg,#22c55e,#16a34a);border:none;border-radius:12px;color:#fff;font-size:17px;font-weight:800;box-shadow:0 4px 24px rgba(34,197,94,0.3);font-family:Georgia,serif}
.btn-secondary{padding:14px;background:none;border:1px solid #2a3d2a;border-radius:12px;color:#6b8f6b;font-size:15px;font-weight:700;font-family:Georgia,serif}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid #1a271a}
.toggle{position:relative;width:44px;height:26px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#2a3d2a;border-radius:13px;transition:0.2s}
.toggle-slider:before{content:"";position:absolute;height:20px;width:20px;left:3px;bottom:3px;background:#6b8f6b;border-radius:50%;transition:0.2s}
.toggle input:checked+.toggle-slider{background:rgba(74,222,128,0.3)}
.toggle input:checked+.toggle-slider:before{transform:translateX(18px);background:#4ade80}
/* Confirmation modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:24px}
.modal-box{background:#1c2a1c;border:1px solid #2a3d2a;border-radius:16px;padding:24px;width:100%;max-width:320px;text-align:center}
</style>
</head>
<body>
<div id="app"></div>
<script>
const DEFAULT_PARS=[4,4,3,4,5,3,4,4,5,4,3,4,5,4,3,4,4,5];
const DEFAULT_HCP=[11,3,15,7,1,17,13,5,9,10,16,6,2,14,18,8,4,12];
const PCOLORS=["#4ade80","#fbbf24","#60a5fa","#f87171","#c084fc","#fb923c","#34d399","#f472b6"];
const STORAGE_KEY="golf-guest-v4";
const MAX_PLAYERS=8;
const MAX_ROUNDS=6;

// ─── Helpers ─────────────────────────────────────────────────────────────────
// Select all text on focus so user can type immediately without highlighting first
function selectOnFocus(input){
  input.addEventListener("focus",e=>{
    // Timeout needed on iOS Safari — selection must happen after focus event settles
    setTimeout(()=>e.target.select(),50);
  });
  return input;
}

// ─── Default makers ─────────────────────────────────────────────────────────────
function mkRound(n){
  return {label:"Round "+n,teeBox:"",courseRating:"72.0",courseSlope:"113",
    teams:[[0,1],[2,3]],  // array of arrays; each inner array is one team
    pars:[...DEFAULT_PARS],hcpIdx:[...DEFAULT_HCP]};
}
function mkScoresForRound(){
  // scores[player][hole] — sized to current player count dynamically at save
  return Array(MAX_PLAYERS).fill(null).map(()=>Array(18).fill(""));
}

// ─── State ────────────────────────────────────────────────────────────────────
let state={
  screen:"setup",setupStep:0,activeRound:0,expandedRound:null,
  tab:"leaderboard",saveStatus:"idle",
  netEntryMode:false,
  useSlopeRating:true,
  players:[
    {name:"Player 1",handicap:"10.4"},
    {name:"Player 2",handicap:"14.2"},
    {name:"Player 3",handicap:"8.1"},
    {name:"Player 4",handicap:"18.7"},
  ],
  rounds:[mkRound(1),mkRound(2),mkRound(3)],
  scores:[mkScoresForRound(),mkScoresForRound(),mkScoresForRound()],
};

// ─── Storage — Firebase Realtime Database + localStorage fallback ─────────────
// Session ID: read from URL hash, or generate a new one and update the URL
function getSessionId(){
  let id=window.location.hash.replace("#","").trim();
  if(!id||id.length<6){
    // Generate a short random ID
    id=Math.random().toString(36).slice(2,8)+Math.random().toString(36).slice(2,6);
    window.location.hash=id;
  }
  return id;
}
const SESSION_ID=getSessionId();
const FB_URL="https://golf-scorer-8a6de-default-rtdb.firebaseio.com/guest/"+SESSION_ID+".json";
let saveTimer=null;
let fbListener=null; // tracks active EventSource for live sync

// Build the payload object to save
function buildPayload(){
  return {
    players:state.players,rounds:state.rounds,scores:state.scores,
    netEntryMode:state.netEntryMode,useSlopeRating:state.useSlopeRating
  };
}

// Apply a loaded data object to state (used by both loadState and live sync)
function applyData(s){
  if(!s)return;
  if(s.players) state.players=s.players;
  if(s.rounds)  state.rounds=s.rounds.map(r=>({teeBox:"",teams:[[0,1],[2,3]],...r}));
  if(s.scores)  state.scores=s.scores;
  if(s.netEntryMode!==undefined) state.netEntryMode=s.netEntryMode;
  if(s.useSlopeRating!==undefined) state.useSlopeRating=s.useSlopeRating;
  while(state.scores.length<state.rounds.length) state.scores.push(mkScoresForRound());
}

// Load on startup — try Firebase first, fall back to localStorage
async function loadState(){
  // Always apply localStorage immediately so app is usable offline
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw) applyData(JSON.parse(raw));
  }catch(e){}

  // Then try Firebase for the latest shared data
  try{
    state.saveStatus="saving";renderSaveStatus(); // show loading indicator
    const res=await fetch(FB_URL);
    if(res.ok){
      const data=await res.json();
      if(data){
        applyData(data);
        // Mirror latest Firebase data into localStorage
        try{localStorage.setItem(STORAGE_KEY,JSON.stringify(buildPayload()));}catch(e){}
      }
    }
    state.saveStatus="idle";renderSaveStatus();
  }catch(e){
    // Offline — already loaded from localStorage above
    state.saveStatus="idle";renderSaveStatus();
  }

  // Start live sync listener (Firebase SSE)
  startLiveSync();
}

// Live sync — Firebase Realtime Database streams changes via Server-Sent Events
function startLiveSync(){
  try{
    // EventSource gives us real-time push updates when any other device saves
    const es=new EventSource(FB_URL.replace(".json","")+"/.json");
    es.addEventListener("put",e=>{
      try{
        const msg=JSON.parse(e.data);
        if(msg&&msg.data){
          applyData(msg.data);
          try{localStorage.setItem(STORAGE_KEY,JSON.stringify(buildPayload()));}catch(ex){}
          renderApp(); // re-render with latest data from any device
        }
      }catch(ex){}
    });
    es.onerror=()=>es.close(); // silently close on error (e.g. offline)
    fbListener=es;
  }catch(e){}
}

// Save to Firebase + localStorage
function scheduleSave(){
  clearTimeout(saveTimer);
  state.saveStatus="saving";renderSaveStatus();
  saveTimer=setTimeout(async ()=>{
    const payload=buildPayload();
    // Always save to localStorage immediately (works offline)
    try{localStorage.setItem(STORAGE_KEY,JSON.stringify(payload));}catch(e){}
    // Then push to Firebase
    try{
      const res=await fetch(FB_URL,{
        method:"PUT",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(payload)
      });
      state.saveStatus=res.ok?"saved":"error";
    }catch(e){
      // Offline — saved to localStorage only
      state.saveStatus="saved"; // treat local save as success
    }
    renderSaveStatus();
    setTimeout(()=>{state.saveStatus="idle";renderSaveStatus();},2000);
  },600);
}

function renderSaveStatus(){
  document.querySelectorAll(".save-status").forEach(el=>{
    if(state.saveStatus==="idle"){el.textContent="";return;}
    const c={saving:{t:"Syncing…",c:"#6b8f6b"},saved:{t:"✓ Synced",c:"#4ade80"},error:{t:"⚠ Sync failed",c:"#f87171"}}[state.saveStatus];
    el.textContent=c.t;el.style.color=c.c;
  });
}

// ─── Round management ─────────────────────────────────────────────────────────
function addRound(){
  if(state.rounds.length>=MAX_ROUNDS)return;
  state.rounds.push(mkRound(state.rounds.length+1));
  state.scores.push(mkScoresForRound());
  scheduleSave();renderApp();
}
function removeRound(ri){
  const hasScores=state.scores[ri].some(p=>p.some(s=>s!==""));
  if(hasScores){
    showConfirmModal("Round "+(ri+1)+" has scores. Remove it?",()=>{
      state.rounds.splice(ri,1);state.scores.splice(ri,1);
      if(state.activeRound>=state.rounds.length)state.activeRound=Math.max(0,state.rounds.length-1);
      scheduleSave();renderApp();
    });
    return;
  }
  state.rounds.splice(ri,1);
  state.scores.splice(ri,1);
  if(state.activeRound>=state.rounds.length) state.activeRound=Math.max(0,state.rounds.length-1);
  scheduleSave();renderApp();
}

// ─── Player management ────────────────────────────────────────────────────────
function addPlayer(){
  if(state.players.length>=MAX_PLAYERS)return;
  const n=state.players.length+1;
  state.players.push({name:"Player "+n,handicap:"10.0"});
  scheduleSave();renderApp();
}
function removePlayer(pi){
  if(state.players.length<=2){alert("Minimum 2 players.");return;}
  // Check if player has any scores
  const hasScores=state.scores.some(rs=>rs[pi]&&rs[pi].some(s=>s!==""));
  if(hasScores){
    showConfirmModal("Player has scores entered. Remove them?",()=>{
      state.players.splice(pi,1);
      state.rounds.forEach(r=>{r.teams=r.teams.map(team=>team.filter(idx=>idx!==pi).map(idx=>idx>pi?idx-1:idx)).filter(t=>t.length>0);if(r.teams.length<2)r.teams.push([]);});
      state.scores.forEach(rs=>rs.splice(pi,1));
      scheduleSave();renderApp();
    });
    return;
  }
  state.players.splice(pi,1);
  // Remove from all team rosters and shift indices
  state.rounds.forEach(r=>{
    r.teams=r.teams.map(team=>team.filter(idx=>idx!==pi).map(idx=>idx>pi?idx-1:idx)).filter(t=>t.length>0);
    if(r.teams.length<2) r.teams.push([]); // keep at least 2 team slots
  });
  state.scores.forEach(rs=>rs.splice(pi,1));
  scheduleSave();renderApp();
}

// ─── Team pairing logic ───────────────────────────────────────────────────────
// Each round has r.teams = array of 2+ arrays of player indices
// We always use exactly 2 teams for best ball match play
function getTeams(ri){return state.rounds[ri].teams||[[0,1],[2,3]];}

function setPlayerTeam(ri,playerIdx,teamIdx){
  const r=state.rounds[ri];
  // Ensure 2 teams exist
  while(r.teams.length<2) r.teams.push([]);
  // Remove player from all teams
  r.teams=r.teams.map(t=>t.filter(p=>p!==playerIdx));
  // Add to target team (teamIdx -1 = sit out)
  if(teamIdx>=0){
    if(!r.teams[teamIdx]) r.teams[teamIdx]=[];
    r.teams[teamIdx].push(playerIdx);
  }
  scheduleSave();
}

// ─── Handicap / scoring ───────────────────────────────────────────────────────
function calcCourseHcp(hcpIndex,slope,rating,totalPar){
  if(!state.useSlopeRating)return Math.round(parseFloat(hcpIndex)||0);
  return Math.round((parseFloat(hcpIndex)||0)*((parseFloat(slope)||113)/113)+((parseFloat(rating)||totalPar)-totalPar));
}
function hcpStrokes(courseHcp,holeHcpIdx){
  if(courseHcp<=0)return 0;
  const full=Math.floor(courseHcp);
  return (holeHcpIdx<=full?1:0)+((courseHcp-full>0&&holeHcpIdx===1)?1:0);
}
function getNet(ri,pi,hi){
  const val=state.scores[ri]?.[pi]?.[hi];
  const g=parseInt(val);if(isNaN(g)||!val)return null;
  if(state.netEntryMode)return g;
  const r=state.rounds[ri];
  const totalPar=r.pars.reduce((s,p)=>s+(parseInt(p)||0),0);
  const cHcp=calcCourseHcp(state.players[pi]?.handicap,r.courseSlope,r.courseRating,totalPar);
  return g-hcpStrokes(cHcp,parseInt(r.hcpIdx[hi])||0);
}
function getCourseHcps(ri){
  const r=state.rounds[ri];
  const totalPar=r.pars.reduce((s,p)=>s+(parseInt(p)||0),0);
  return state.players.map(p=>calcCourseHcp(p.handicap,r.courseSlope,r.courseRating,totalPar));
}
function bestBall(ri,team,hole){
  const nets=team.map(pi=>getNet(ri,pi,hole));
  const valid=nets.filter(n=>n!==null);
  return valid.length?Math.min(...valid):null;
}
function computeRound(ri){
  const r=state.rounds[ri];
  const teams=getTeams(ri);
  const t1=teams[0]||[],t2=teams[1]||[];
  const courseHcps=getCourseHcps(ri);
  let p1w=0,p2w=0,halves=0;
  const holes=[];
  for(let h=0;h<18;h++){
    const bb1=bestBall(ri,t1,h);
    const bb2=bestBall(ri,t2,h);
    let result=null;
    if(bb1!==null&&bb2!==null){
      if(bb1<bb2){result="p1";p1w++;}
      else if(bb2<bb1){result="p2";p2w++;}
      else{result="halve";halves++;}
    }
    holes.push({bb1,bb2,result,par:parseInt(r.pars[h])||4});
  }
  const diff=p1w-p2w;
  const done=holes.filter(h=>h.result!==null);
  const parDone=done.reduce((s,h)=>s+h.par,0);
  const p1net=done.reduce((s,h)=>h.bb1!==null?s+h.bb1:s,0);
  const p2net=done.reduce((s,h)=>h.bb2!==null?s+h.bb2:s,0);
  return{holes,p1w,p2w,halves,t1,t2,
    leader:diff>0?"p1":diff<0?"p2":"none",
    matchStr:diff===0?"A/S":`${Math.abs(diff)} UP`,
    courseHcps,totalPar:r.pars.reduce((s,p)=>s+(parseInt(p)||0),0),
    p1diff:done.length?p1net-parDone:null,
    p2diff:done.length?p2net-parDone:null};
}
function computeOverall(){
  const pts=Array(state.players.length).fill(0);
  const rounds=state.rounds.map((r,ri)=>{
    const rd=computeRound(ri);
    const {t1,t2}=rd;
    const allPlaying=[...t1,...t2];
    const has=allPlaying.some(pi=>state.scores[ri]?.[pi]?.some(s=>s!==""));
    if(!has)return{...rd,w1:0,w2:0};
    let w1=0,w2=0;
    if(rd.leader==="p1")w1=1;else if(rd.leader==="p2")w2=1;else{w1=0.5;w2=0.5;}
    t1.forEach(pi=>{if(pi<pts.length)pts[pi]+=w1;});
    t2.forEach(pi=>{if(pi<pts.length)pts[pi]+=w2;});
    return{...rd,w1,w2};
  });
  return{pts,rounds};
}

// ─── DOM helpers ──────────────────────────────────────────────────────────────
function el(tag,attrs={},children=[]){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on")&&typeof v==="function")e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")e.className=v;
    else e.setAttribute(k,v);
  }
  for(const c of[children].flat()){
    if(c===null||c===undefined)continue;
    if(typeof c==="string"||typeof c==="number")e.appendChild(document.createTextNode(String(c)));
    else e.appendChild(c);
  }
  return e;
}
const div=(a,c)=>el("div",a,c);
const span=(a,c)=>el("span",a,c);
const btn=(a,c)=>el("button",a,c);
const inp=a=>el("input",a,[]);
function pcolor(i){return PCOLORS[i%PCOLORS.length];}
function playerDot(i,size=10){return div({style:{width:size+"px",height:size+"px",borderRadius:"50%",background:pcolor(i),flexShrink:0}},[]);}
function playerBadge(i){return div({style:{width:28,height:28,borderRadius:"50%",background:pcolor(i)+"20",border:`1.5px solid ${pcolor(i)}50`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:pcolor(i),flexShrink:0}},[(i+1)+""]) }
function diffLabel(diff){
  if(diff===null)return span({style:{color:"#4b5563",fontSize:11}},["—"]);
  const color=diff<0?"#4ade80":diff===0?"#9ab89a":"#f97316";
  return span({style:{color,fontWeight:700,fontSize:11}},[diff>0?`+${diff}`:diff+""]);
}
function toggleSwitch(checked,onChange){
  const label=el("label",{className:"toggle"},[]);
  const input=inp({type:"checkbox"});
  input.checked=checked;
  input.addEventListener("change",e=>onChange(e.target.checked));
  label.appendChild(input);
  label.appendChild(div({className:"toggle-slider"},[]));
  return label;
}
function scoreInput(ri,pi,hi,flatIdx,allInputs,isLastOnHole){
  // flatIdx: position in allInputs array
  // allInputs: flat array of all score inputs [{el,pi,hi,isLastOnHole}]
  // isLastOnHole: true if this is the last player (t2 last) on this hole
  const val=state.scores[ri]?.[pi]?.[hi]||"";
  const par=parseInt(state.rounds[ri].pars[hi])||4;
  const v=parseInt(val);
  const diff=!isNaN(v)?v-par:null;
  let color="#9ab89a";
  if(diff!==null){
    if(diff<=-2)color="#fbbf24";else if(diff===-1)color="#4ade80";
    else if(diff===0)color="#e8f5e8";else if(diff===1)color="#f97316";else color="#ef4444";
  }
  const input=inp({type:"text",inputmode:"numeric",pattern:"[0-9]*",maxlength:"2",value:val,
    "data-pi":pi,"data-hi":hi,
    className:"score-input",style:{color,background:val?"rgba(74,222,128,0.08)":"rgba(255,255,255,0.04)",
      border:`1px solid ${val?"rgba(74,222,128,0.25)":"rgba(255,255,255,0.07)"}`}});
  input.addEventListener("input",e=>{
    const cleaned=e.target.value.replace(/[^0-9]/g,"");
    e.target.value=cleaned;
    if(!state.scores[ri])state.scores[ri]=mkScoresForRound();
    state.scores[ri][pi][hi]=cleaned;
    scheduleSave();
    if(!cleaned)return;
    const num=parseInt(cleaned);
    // Advance on any single digit 1-9, or on 2 digits (for scores >= 10)
    const shouldAdvance=(num>=1&&num<=9&&cleaned.length===1)||(cleaned.length===2);
    if(!shouldAdvance)return;
    const nextEntry=allInputs[flatIdx+1];
    if(nextEntry){
      // Moving within the hole (not last player) — just focus, no rebuild
      nextEntry.el.focus();
      nextEntry.el.select();
    } else {
      // Last input of the whole round — just update colours in place
      refreshScorecard();
    }
    // If this is the last player on the hole, rebuild after a short delay
    // so the result colours & subtotals update, but focus has already moved
    if(isLastOnHole){
      setTimeout(()=>{
        const nextHi=nextEntry?nextEntry.hi:null;
        const nextPi=nextEntry?nextEntry.pi:null;
        refreshScorecard(nextPi,nextHi);
      },50);
    }
  });
  return input;
}

// ─── Setup Screen ─────────────────────────────────────────────────────────────
function renderSetup(){
  const wrap=div({style:{minHeight:"100vh",background:"#0f1a0f"}},[]);
  wrap.appendChild(div({style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px 0"}},[
    div({style:{display:"flex",alignItems:"center",gap:6}},[
      span({style:{fontSize:13,color:"#6b8f6b",fontWeight:700}},["⛳ Guest Scorer"]),
      span({className:"save-status",style:{fontSize:10,fontWeight:700,marginLeft:6}},[]),
    ]),
    btn({style:{color:"#f87171",fontSize:13,fontWeight:700,padding:"6px 12px",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:10},onClick:handleReset},["Reset All"]),
  ]));

  if(state.setupStep===0){
    // ── Step 1: Players & Settings ──
    const inner=div({style:{padding:"24px 16px",maxWidth:480,margin:"0 auto"}},[]);
    inner.appendChild(div({style:{textAlign:"center",marginBottom:24}},[
      div({style:{fontSize:44,marginBottom:8}},["⛳"]),
      el("h1",{style:{fontSize:26,fontWeight:900,color:"#60a5fa",letterSpacing:"-0.03em",marginBottom:4}},["Guest Scorer"]),
      el("p",{style:{color:"#6b8f6b",fontSize:13}},["Step 1 of 2 — Players & Settings"]),
    ]));

    // Players card
    const pcard=div({className:"card",style:{marginBottom:14}},[]);
    pcard.appendChild(div({className:"card-header"},[
      span({},[" PLAYERS & HANDICAP INDEX"]),
      span({style:{fontSize:11,color:"#4b5563"}},[state.players.length+"/"+MAX_PLAYERS]),
    ]));
    state.players.forEach((p,i)=>{
      const row=div({style:{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",borderBottom:i<state.players.length-1?"1px solid #1a271a":"none"}},[]);
      row.appendChild(playerBadge(i));
      const nameIn=selectOnFocus(inp({type:"text",value:p.name,placeholder:`Player ${i+1}`,
        style:{flex:1,background:"transparent",border:"none",color:"#e8f5e8",fontSize:14,fontWeight:600,outline:"none"}}));
      nameIn.addEventListener("input",e=>{state.players[i].name=e.target.value;scheduleSave();});
      row.appendChild(nameIn);

    }
    inner.appendChild(pcard);

    // Rounds count card
    const rcard=div({className:"card",style:{marginBottom:14}},[]);

    const rcRow=div({style:{display:"flex",alignItems:"center",gap:10,padding:"12px 16px"}},[]);
    rcRow.appendChild(span({style:{fontSize:13,color:"#6b8f6b",flex:1}},["Rounds in tournament"]));
    // Stepper

    stepRow.appendChild(btn({style:{width:32,height:32,borderRadius:"50%",border:"1px solid #2a3d2a",color:"#6b8f6b",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"},

        if(state.rounds.length<=1)return;
        removeRound(state.rounds.length-1);
      }},["−"]));
    stepRow.appendChild(span({style:{fontSize:20,fontWeight:800,color:"#4ade80",minWidth:24,textAlign:"center"}},[state.rounds.length+""]));
    stepRow.appendChild(btn({style:{width:32,height:32,borderRadius:"50%",border:"1px solid #2a3d2a",color:"#6b8f6b",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"},
      onClick:()=>{
        if(state.rounds.length>=MAX_ROUNDS)return;
        addRound();
      }},["＋"]));
    rcRow.appendChild(stepRow);
    rcard.appendChild(rcRow);
    rcard.appendChild(div({style:{padding:"6px 16px 10px"}},[
      span({style:{fontSize:11,color:"#4b5563"}},["You can also add/remove rounds from the Setup screen at any time."]),
    ]));
    inner.appendChild(rcard);

    // Scoring settings
    const scard=div({className:"card",style:{marginBottom:24}},[]);
    scard.appendChild(div({className:"card-header"},[span({},[" SCORING SETTINGS"])]));
    const srRow=div({className:"toggle-row"},[]);
    srRow.appendChild(div({},[
      div({style:{fontSize:14,fontWeight:700,color:"#e8f5e8",marginBottom:2}},["Use Slope & Rating"]),
      div({style:{fontSize:11,color:"#6b8f6b"}},["Auto-calculates course handicap"]),
    ]));
    srRow.appendChild(toggleSwitch(state.useSlopeRating,v=>{state.useSlopeRating=v;scheduleSave();renderApp();}));
    scard.appendChild(srRow);
    const nmRow=div({className:"toggle-row",style:{borderBottom:"none"}},[]);
    nmRow.appendChild(div({},[
      div({style:{fontSize:14,fontWeight:700,color:"#e8f5e8",marginBottom:2}},["Enter Net Scores Directly"]),
      div({style:{fontSize:11,color:"#6b8f6b"}},[state.netEntryMode?"Type adjusted net score per hole":"Type gross, app calculates net"]),
    ]));
    nmRow.appendChild(toggleSwitch(state.netEntryMode,v=>{state.netEntryMode=v;scheduleSave();renderApp();}));
    scard.appendChild(nmRow);
    let modeNote=state.netEntryMode?"Enter pre-adjusted net score per hole. No automatic handicap calculation.":
      state.useSlopeRating?"Enter gross scores. Strokes auto-applied using slope, rating & hole index.":
      "Enter gross scores. Strokes applied using handicap index & hole index only.";
    scard.appendChild(div({style:{padding:"10px 16px",background:"rgba(96,165,250,0.05)",borderTop:"1px solid #1a271a"}},[
      span({style:{fontSize:11,color:"#60a5fa"}},[modeNote])
    ]));
    inner.appendChild(scard);

    inner.appendChild(el("button",{className:"btn-primary",onClick:()=>{state.setupStep=1;renderApp();}},["Next: Configure Rounds →"]));
    wrap.appendChild(inner);

  } else {
    // ── Step 2: Rounds ──
    const inner=div({style:{padding:"16px",maxWidth:520,margin:"0 auto"}},[]);
    inner.appendChild(div({style:{textAlign:"center",marginBottom:16}},[
      el("p",{style:{color:"#6b8f6b",fontSize:13,marginBottom:4}},["Step 2 of 2 — Rounds"]),
      el("p",{style:{color:"#4b5563",fontSize:11}},["Configure each round's course, pairings & hole data"]),
    ]));

    state.rounds.forEach((r,ri)=>{
      const rcard=div({className:"card",style:{marginBottom:14}},[]);

      // Round header with course name + tee box
      const rhead=div({style:{padding:"10px 14px",borderBottom:"1px solid #2a3d2a",background:"rgba(74,222,128,0.04)",display:"flex",alignItems:"center",gap:8}},[]);
      const nameFields=div({style:{flex:1,display:"flex",flexDirection:"column",gap:4}},[]);
      const labelIn=selectOnFocus(inp({type:"text",value:r.label,placeholder:"Course name",
        style:{background:"transparent",border:"none",borderBottom:"1px solid rgba(255,255,255,0.08)",color:"#e8f5e8",fontSize:14,fontWeight:800,outline:"none",paddingBottom:2}}));
      labelIn.addEventListener("input",e=>{state.rounds[ri].label=e.target.value;scheduleSave();});
      const teeIn=selectOnFocus(inp({type:"text",value:r.teeBox||"",placeholder:"Tee box (e.g. Blue, White…)",
        style:{background:"transparent",border:"none",borderBottom:"1px solid rgba(255,255,255,0.06)",color:"#9ab89a",fontSize:11,outline:"none",paddingBottom:2}}));
      teeIn.addEventListener("input",e=>{state.rounds[ri].teeBox=e.target.value;scheduleSave();});
      nameFields.appendChild(labelIn);
      nameFields.appendChild(teeIn);
      rhead.appendChild(nameFields);
      // Remove round button (only if >1 round)
      if(state.rounds.length>1){
        rhead.appendChild(btn({style:{color:"#f87171",fontSize:13,fontWeight:700,border:"1px solid rgba(239,68,68,0.3)",borderRadius:6,padding:"3px 8px",flexShrink:0},
          onClick:()=>removeRound(ri)},["✕"]));
      }
      rhead.appendChild(btn({style:{border:"1px solid #2a3d2a",borderRadius:6,color:"#6b8f6b",fontSize:11,fontWeight:700,padding:"4px 8px",flexShrink:0},
        onClick:()=>{state.expandedRound=state.expandedRound===ri?null:ri;renderApp();}},
        [state.expandedRound===ri?"▲":"▼"]));
      rcard.appendChild(rhead);

      // Team preview
      const teams=getTeams(ri);
      const prev=div({style:{display:"flex",gap:6,padding:"8px 14px",borderBottom:state.expandedRound===ri?"1px solid #2a3d2a":"none",flexWrap:"wrap"}},[]);
      teams.forEach((team,ti)=>{
        const box=div({style:{flex:1,minWidth:80,padding:"6px 8px",borderRadius:8,
          background:ti===0?"rgba(74,222,128,0.06)":"rgba(251,191,36,0.06)",
          border:`1px solid ${ti===0?"rgba(74,222,128,0.2)":"rgba(251,191,36,0.2)"}`}},[]);
        box.appendChild(div({style:{fontSize:9,fontWeight:700,color:ti===0?"#4ade80":"#fbbf24",marginBottom:3,letterSpacing:"0.06em"}},["TEAM "+(ti===0?"A":"B")]));
        if(team.length===0){
          box.appendChild(div({style:{fontSize:11,color:"#4b5563",fontStyle:"italic"}},["Empty"]));
        } else {
          team.forEach(idx=>box.appendChild(div({style:{fontSize:11,fontWeight:700,color:pcolor(idx),lineHeight:1.4}},[state.players[idx]?.name||`P${idx+1}`])));
        }
        prev.appendChild(box);
      });
      // Sit-out indicator
      const allInTeams=teams.flat();
      const sittingOut=state.players.map((_,i)=>i).filter(i=>!allInTeams.includes(i));
      if(sittingOut.length>0){
        const sb=div({style:{padding:"4px 8px",borderRadius:8,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)"}},[]);
        sb.appendChild(div({style:{fontSize:9,fontWeight:700,color:"#6b8f6b",marginBottom:3}},["SITTING OUT"]));
        sittingOut.forEach(idx=>sb.appendChild(div({style:{fontSize:11,color:"#6b8f6b"}},[state.players[idx]?.name||`P${idx+1}`])));
        prev.appendChild(sb);
      }
      rcard.appendChild(prev);

      if(state.expandedRound===ri){
        // ── Pairings ──
        rcard.appendChild(div({style:{padding:"7px 14px",background:"rgba(74,222,128,0.03)",borderBottom:"1px solid #1a271a"}},[
          span({style:{fontSize:11,fontWeight:700,color:"#6b8f6b",letterSpacing:"0.06em"}},["TEAM ASSIGNMENTS"])
        ]));
        rcard.appendChild(div({style:{padding:"8px 14px",borderBottom:"1px solid #1a271a"}},[
          span({style:{fontSize:11,color:"#4b5563"}},["Tap a player to assign them to Team A, Team B, or sit out."])
        ]));

        state.players.forEach((p,pi)=>{
          const teams=getTeams(ri);
          const inT1=teams[0].includes(pi);
          const inT2=teams[1].includes(pi);
          const sitOut=!inT1&&!inT2;
          const prow=div({style:{display:"flex",alignItems:"center",gap:8,padding:"8px 14px",borderBottom:"1px solid #1a271a"}},[]);
          prow.appendChild(div({style:{width:24,height:24,borderRadius:"50%",background:pcolor(pi)+"20",border:`1.5px solid ${pcolor(pi)}50`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:pcolor(pi),flexShrink:0}},[(pi+1)+""]) );
          prow.appendChild(span({style:{flex:1,fontSize:13,fontWeight:600,color:"#e8f5e8"}},[p.name]));
          // Team A / Team B / Sit Out buttons
          const choices=[["A",0,"#4ade80",inT1],["B",1,"#fbbf24",inT2],["—",-1,"#6b8f6b",sitOut]];
          choices.forEach(([lbl,tidx,col,active])=>{
            prow.appendChild(btn({
              style:{padding:"4px 10px",borderRadius:6,fontSize:12,fontWeight:700,
                background:active?col+"25":"rgba(255,255,255,0.05)",
                color:active?col:"#4b5563",
                outline:active?`1.5px solid ${col}60`:"1px solid rgba(255,255,255,0.08)"},
              onClick:()=>{setPlayerTeam(ri,pi,tidx);renderApp();}
            },[lbl]));
          });
          rcard.appendChild(prow);
        });

        // ── Course Setup ──
        rcard.appendChild(div({style:{padding:"7px 14px",background:"rgba(96,165,250,0.03)",borderTop:"1px solid #1a271a",borderBottom:"1px solid #1a271a"}},[
          span({style:{fontSize:11,fontWeight:700,color:"#6b8f6b",letterSpacing:"0.06em"}},["COURSE SETUP"])
        ]));
        const totalPar=r.pars.reduce((s,p)=>s+(parseInt(p)||0),0);
        const courseRow=div({style:{padding:"10px 14px",borderBottom:"1px solid #1a271a",display:"flex",gap:12,flexWrap:"wrap",alignItems:"center"}},[]);
        if(state.useSlopeRating){
          [["Rating",r.courseRating,"courseRating",4],["Slope",r.courseSlope,"courseSlope",3]].forEach(([lbl,val,field,maxl])=>{
            const g=div({style:{display:"flex",alignItems:"center",gap:5}},[]);
            g.appendChild(span({style:{fontSize:11,color:"#6b8f6b"}},[lbl]));
            const si=inp({type:"text",inputmode:"decimal",pattern:"[0-9.]*",maxlength:maxl+"",value:val,
              style:{width:field==="courseRating"?"56px":"50px",height:28,background:"rgba(255,255,255,0.05)",border:"1px solid #2a3d2a",borderRadius:6,color:"#4ade80",fontSize:13,fontWeight:700,textAlign:"center",outline:"none"}});
            si.addEventListener("input",e=>{const v=e.target.value.replace(/[^0-9.]/g,"");e.target.value=v;state.rounds[ri][field]=v;scheduleSave();});
            g.appendChild(si);courseRow.appendChild(g);
          });
        }
        courseRow.appendChild(div({style:{display:"flex",alignItems:"center",gap:5}},[
          span({style:{fontSize:11,color:"#6b8f6b"}},["Total Par"]),
          span({style:{fontSize:13,fontWeight:700,color:"#9ab89a"}},[totalPar+""]),
        ]));
        rcard.appendChild(courseRow);

        // Hole grid
        const grid=div({style:{padding:"8px 12px",overflowX:"auto"}},[]);
        const clearRow=div({style:{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}},[]);
        clearRow.appendChild(btn({style:{fontSize:11,fontWeight:700,color:"#9ab89a",background:"rgba(154,184,154,0.1)",border:"1px solid rgba(154,184,154,0.25)",borderRadius:6,padding:"4px 8px"},
          onClick:()=>{state.rounds[ri].pars=Array(18).fill("");scheduleSave();renderApp();}},["✕ Clear PAR"]));
        clearRow.appendChild(btn({style:{fontSize:11,fontWeight:700,color:"#9ab89a",background:"rgba(154,184,154,0.1)",border:"1px solid rgba(154,184,154,0.25)",borderRadius:6,padding:"4px 8px"},
          onClick:()=>{state.rounds[ri].pars=[...DEFAULT_PARS];scheduleSave();renderApp();}},["↺ Reset PAR"]));
        if(!state.netEntryMode){
          clearRow.appendChild(btn({style:{fontSize:11,fontWeight:700,color:"#60a5fa",background:"rgba(96,165,250,0.1)",border:"1px solid rgba(96,165,250,0.25)",borderRadius:6,padding:"4px 8px"},
            onClick:()=>{state.rounds[ri].hcpIdx=Array(18).fill("");scheduleSave();renderApp();}},["✕ Clear HCP"]));
          clearRow.appendChild(btn({style:{fontSize:11,fontWeight:700,color:"#6b8f6b",background:"rgba(107,143,107,0.1)",border:"1px solid rgba(107,143,107,0.25)",borderRadius:6,padding:"4px 8px"},
            onClick:()=>{state.rounds[ri].hcpIdx=[...DEFAULT_HCP];scheduleSave();renderApp();}},["↺ Reset HCP"]));
        }
        grid.appendChild(clearRow);

        const allParInputs=[],allHcpInputs=[];
        function hcpDuplicates(){
          const vals=state.rounds[ri].hcpIdx.map(v=>parseInt(v)).filter(v=>!isNaN(v)&&v>=1&&v<=18);
          const seen=new Set(),dups=new Set();
          vals.forEach(v=>{if(seen.has(v))dups.add(v);else seen.add(v);});
          return dups;
        }
        function refreshHcpHighlights(){
          const dups=hcpDuplicates();
          allHcpInputs.forEach((inp,h)=>{
            const v=parseInt(state.rounds[ri].hcpIdx[h]);
            const isDup=!isNaN(v)&&dups.has(v);
            inp.style.border=isDup?"1px solid rgba(251,191,36,0.7)":"1px solid #2a3d2a";
            inp.style.background=isDup?"rgba(251,191,36,0.12)":"rgba(255,255,255,0.04)";
            inp.style.color=isDup?"#fbbf24":"#60a5fa";
          });
          let banner=grid.querySelector(".hcp-dup-banner");
          if(dups.size>0){
            if(!banner){banner=document.createElement("div");banner.className="hcp-dup-banner";Object.assign(banner.style,{padding:"5px 8px",background:"rgba(251,191,36,0.08)",borderRadius:6,border:"1px solid rgba(251,191,36,0.3)",marginTop:4,fontSize:10,color:"#fbbf24",fontWeight:700});grid.appendChild(banner);}
            banner.textContent="⚠ Duplicate HCP: "+[...dups].sort((a,b)=>a-b).join(", ");
          }else{if(banner)banner.remove();}
        }

        [0,1].forEach(half=>{
          grid.appendChild(div({style:{display:"grid",gridTemplateColumns:"28px repeat(9,1fr)",gap:3,marginBottom:3}},[
            span({},[]),
            ...Array.from({length:9},(_,i)=>span({style:{fontSize:10,color:"#6b8f6b",textAlign:"center",fontWeight:700}},[(half*9+i+1)+""]))
          ]));
          const parRows=[["PAR",r.pars,(h,v)=>{state.rounds[ri].pars[half*9+h]=v===""?"":parseInt(v)||state.rounds[ri].pars[half*9+h];scheduleSave();},"#9ab89a",allParInputs]];
          if(!state.netEntryMode){
            parRows.push(["HCP",r.hcpIdx,(h,v)=>{state.rounds[ri].hcpIdx[half*9+h]=v===""?"":parseInt(v)||state.rounds[ri].hcpIdx[half*9+h];scheduleSave();refreshHcpHighlights();},"#60a5fa",allHcpInputs]);
          }
          parRows.forEach(([lbl,vals,fn,col,allInputs])=>{
            const isPar=lbl==="PAR";
            const row=div({style:{display:"grid",gridTemplateColumns:"28px repeat(9,1fr)",gap:3,marginBottom:3}},[
              span({style:{fontSize:9,color:"#6b8f6b",textAlign:"center",alignSelf:"center",fontWeight:700}},[lbl])
            ]);
            vals.slice(half*9,half*9+9).forEach((v,i)=>{
              const gi=inp({type:"text",inputmode:"numeric",pattern:"[0-9]*",maxlength:"2",value:v+"",
                style:{width:"100%",height:28,background:"rgba(255,255,255,0.04)",border:"1px solid #2a3d2a",borderRadius:5,color:col,fontSize:12,fontWeight:700,textAlign:"center",outline:"none"}});
              allInputs.push(gi);
              let hcpAdvanceTimer=null;
              gi.addEventListener("input",e=>{
                let nv=e.target.value.replace(/[^0-9]/g,"");
                if(isPar&&nv!==""){const num=parseInt(nv);if(num<3||num>5){e.target.value="";return;}}
                if(!isPar&&nv!==""){const num=parseInt(nv);if(nv.length===2&&(num<1||num>18)){nv=nv.slice(0,1);}}
                e.target.value=nv;fn(i,nv);
                if(nv===""){clearTimeout(hcpAdvanceTimer);return;}
                const num=parseInt(nv);
                // Cancel any pending delayed advance
                clearTimeout(hcpAdvanceTimer);
                const advance=()=>{
                  const flatIdx=allInputs.indexOf(gi);
                  if(flatIdx!==-1&&flatIdx<allInputs.length-1){allInputs[flatIdx+1].focus();allInputs[flatIdx+1].select();}
                };
                if(isPar){
                  // PAR: always advance immediately on 1 digit
                  advance();
                } else if(nv.length===2){
                  // HCP: 2 digits — advance immediately
                  advance();
                } else if(num>=2&&num<=9){
                  // HCP 2-9: advance immediately (can't be start of valid 2-digit number)
                  advance();
                } else if(num===1){
                  // HCP "1": could be 1, 10-18 — wait 800ms then advance
                  hcpAdvanceTimer=setTimeout(advance,800);
                }
              });
              // If user leaves the field (blur), cancel any pending timer and commit
              gi.addEventListener("blur",()=>clearTimeout(hcpAdvanceTimer));
              row.appendChild(gi);
            });
            grid.appendChild(row);
          });
          if(half===0)grid.appendChild(div({style:{height:5}},[]));
        });
        if(!state.netEntryMode){
          refreshHcpHighlights();
          grid.appendChild(div({style:{padding:"5px 6px",background:"rgba(96,165,250,0.06)",borderRadius:6,border:"1px solid rgba(96,165,250,0.15)",marginTop:4}},[
            span({style:{fontSize:10,color:"#60a5fa"}},["HCP = Hole index (1–18, 1=hardest). Duplicates highlighted yellow."])
          ]));
        }
        rcard.appendChild(grid);
      }
      inner.appendChild(rcard);
    });

    // Add round button
    if(state.rounds.length<MAX_ROUNDS){
      inner.appendChild(btn({style:{width:"100%",padding:"12px",marginBottom:14,color:"#4ade80",fontSize:13,fontWeight:700,
        border:"1px dashed rgba(74,222,128,0.3)",borderRadius:12,background:"rgba(74,222,128,0.04)"},
        onClick:addRound},[`+ Add Round (${state.rounds.length}/${MAX_ROUNDS})`]));
    }

    inner.appendChild(div({style:{display:"flex",gap:10,marginBottom:24}},[
      btn({className:"btn-secondary",style:{flex:1},onClick:()=>{state.setupStep=0;renderApp();}},["← Back"]),
      btn({className:"btn-primary",style:{flex:2,width:"auto",padding:"14px"},onClick:()=>{state.screen="home";renderApp();}},["Start Tournament →"]),
    ]));
    wrap.appendChild(inner);
  }
  return wrap;
}

  const topbar=div({className:"topbar"},[]);
  const toprow=div({style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}},[]);
  toprow.appendChild(div({style:{display:"flex",alignItems:"center",gap:8}},[
    span({style:{fontSize:20}},["⛳"]),
    div({},[
      div({style:{display:"flex",alignItems:"center",gap:6}},[
        div({style:{fontSize:15,fontWeight:800,color:"#60a5fa"}},["Guest Scorer"]),
        span({className:"save-status",style:{fontSize:10,fontWeight:700,marginLeft:6}},[]),
      ]),
      div({style:{fontSize:11,color:"#6b8f6b"}},[
        state.netEntryMode?"Net Entry":state.useSlopeRating?"Slope/Rating On":"Index Only",
        " · "+state.players.length+" players · "+state.rounds.length+" rounds",
      ]),
      div({style:{fontSize:10,color:"#4b5563",marginTop:1}},["Session: "+SESSION_ID]),
    ]),
  ]));
  const rbtnRow=div({style:{display:"flex",gap:6,alignItems:"center"}},[]);
  rbtnRow.appendChild(btn({style:{color:"#f87171",fontSize:14,fontWeight:700,padding:"8px 14px",lineHeight:1,background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:10},onClick:handleReset},["Reset All"]));
  rbtnRow.appendChild(btn({style:{color:"#e8f5e8",fontSize:14,fontWeight:700,padding:"8px 14px",lineHeight:1,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:10},onClick:()=>{state.screen="setup";state.setupStep=0;renderApp();}},["Setup"]));
  toprow.appendChild(rbtnRow);
  topbar.appendChild(toprow);
  const tabs=div({className:"tabs"},[]);
  ["leaderboard","rounds"].forEach(t=>{
    tabs.appendChild(btn({className:"tab-btn"+(state.tab===t?" active":""),onClick:()=>{state.tab=t;renderApp();}},
      [t.charAt(0).toUpperCase()+t.slice(1)]));

  topbar.appendChild(tabs);
  wrap.appendChild(topbar);
  wrap.appendChild(state.tab==="leaderboard"?renderLeaderboard():renderRoundsList());
  return wrap;
}

function renderLeaderboard(){
  const{pts,rounds:rds}=computeOverall();
  const ranked=[...state.players.map((p,i)=>({...p,idx:i,pts:pts[i]}))].sort((a,b)=>b.pts-a.pts);
  const wrap=div({style:{padding:"14px",maxWidth:500,margin:"0 auto"}},[]);
  wrap.appendChild(div({style:{textAlign:"center",marginBottom:16}},[
    div({style:{fontSize:11,fontWeight:700,color:"#6b8f6b",letterSpacing:"0.08em",marginBottom:4}},["OVERALL STANDINGS"]),
    div({style:{fontSize:11,color:"#4b5563"}},["Win=1pt · Halve=0.5pt · Loss=0pts"]),
  ]));
  const card=div({className:"card",style:{marginBottom:20}},[]);
  ranked.forEach((p,rank)=>{
    const isLead=rank===0&&p.pts>0;
    const row=div({style:{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",
      borderBottom:rank<ranked.length-1?"1px solid #1a271a":"none",
      background:isLead?"rgba(251,191,36,0.03)":"transparent"}},[]);
    row.appendChild(div({style:{width:24,height:24,borderRadius:"50%",flexShrink:0,

  // ── Share / QR button ────────────────────────────────────────────────────────

  // ── Version history footer ────────────────────────────────────────────────────
  const versions=[
    {v:"v1.0",  desc:"Basic 4-player stroke play scorer"},
    {v:"v1.1",  desc:"Match play format, hole-by-hole W/L/½"},

    {v:"v1.7",  desc:"Tee box name field, slope/rating toggle"},
    {v:"v1.8",  desc:"Net score entry mode toggle"},

    {v:"v3.1",  desc:"Share button with QR code, version history footer"},
  ];

  const vwrap=div({style:{margin:"24px 0 32px",padding:"0 4px"}},[]);
  const vheader=div({style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8,cursor:"pointer"},
    onClick:()=>{

      if(vlist)vlist.style.display=vlist.style.display==="none"?"block":"none";
    }
  },[
    span({style:{fontSize:11,fontWeight:700,color:"#4b5563",letterSpacing:"0.08em"}},["VERSION HISTORY"]),
    span({style:{fontSize:11,color:"#4b5563"}},["▾"]),
  ]);
  vwrap.appendChild(vheader);
  const vlist=div({className:"vlist",style:{display:"none"}},[]);
  [...versions].reverse().forEach((ver,i)=>{
    const isLatest=i===0;
    vlist.appendChild(div({style:{
      display:"flex",gap:10,padding:"7px 0",
      borderBottom:i<versions.length-1?"1px solid #1a271a":"none",

    }},[

        minWidth:36,flexShrink:0,lineHeight:1.6}},[ver.v]),
      span({style:{fontSize:11,color:isLatest?"#9ab89a":"#4b5563",lineHeight:1.6}},[ver.desc]),

        border:"1px solid rgba(74,222,128,0.3)",borderRadius:4,padding:"1px 5px",flexShrink:0,alignSelf:"center"}},["CURRENT"])]:[] ),

  return wrap;

let scorecardRoot=null;
function renderScorecard(){
  const wrap=div({style:{minHeight:"100vh",background:"#0f1a0f"}},[]);
  scorecardRoot=wrap;
  const inner=div({style:{maxWidth:520,margin:"0 auto"}},[]);
  inner.appendChild(buildScorecardContent(state.activeRound));
  wrap.appendChild(inner);
  return wrap;
}
function buildScorecardContent(ri){
  const r=state.rounds[ri];
  const rd=computeRound(ri);
  const{t1,t2,courseHcps}=rd;
  const pairs=[t1,t2];
  const root=div({},[]);

  // Dynamic grid columns based on team sizes
  const t1cols=t1.length||1;
  const t2cols=t2.length||1;
  const cols=`22px 24px repeat(${t1cols},1fr) 34px repeat(${t2cols},1fr)`;

  const diff=rd.p1w-rd.p2w;
  const sLabel=diff===0&&rd.p1w===0?"Not Started":diff===0?"All Square":
    `${(diff>0?t1:t2).map(i=>state.players[i]?.name.split(" ")[0]||"?").join("&")} ${Math.abs(diff)} UP`;
  const sColor=diff===0&&rd.p1w===0?"#6b8f6b":diff===0?"#94a3b8":diff>0?"#4ade80":"#fbbf24";

  // Header
  const head=div({style:{position:"sticky",top:0,zIndex:10,background:"#0f1a0f",borderBottom:"1px solid #2a3d2a",padding:"10px 12px 8px"}},[]);
  const htop=div({style:{display:"flex",alignItems:"center",gap:10,marginBottom:8}},[]);
  htop.appendChild(btn({style:{color:"#e8f5e8",fontSize:18,fontWeight:700,padding:"8px 14px",lineHeight:1,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:10,flexShrink:0},onClick:()=>{state.screen="home";renderApp();}},["← Back"]));
  // Clear scores button — shown in scorecard header
  const hasAnyScores=[...rd.t1,...rd.t2].some(pi=>state.scores[ri]?.[pi]?.some(s=>s!==""));
  if(hasAnyScores){
    htop.appendChild(btn({
      style:{color:"#f87171",fontSize:13,fontWeight:700,padding:"8px 12px",lineHeight:1,
        background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.3)",
        borderRadius:10,flexShrink:0},
      onClick:()=>showConfirmModal(
        "Clear all scores for "+r.label+"?",
        ()=>{state.scores[ri]=mkScoresForRound();scheduleSave();renderApp();}
      )
    },["✕ Clear"]));
  }
  htop.appendChild(div({style:{flex:1}},[
    div({style:{fontSize:15,fontWeight:800,color:"#e8f5e8"}},[r.label+(r.teeBox?" — "+r.teeBox:"")]),
    div({style:{fontSize:11,color:"#6b8f6b"}},[
      state.netEntryMode?"Net scores":state.useSlopeRating?`Rating ${r.courseRating} · Slope ${r.courseSlope} · Par ${rd.totalPar}`:`Index HCP · Par ${rd.totalPar}`
    ]),
  ]));
  htop.appendChild(div({"data-match-status":"",style:{fontSize:12,fontWeight:700,color:sColor,textAlign:"right"}},[sLabel]));
  head.appendChild(htop);
  const pairBoxes=div({style:{display:"flex",gap:6}},[]);
  pairs.forEach((team,pi)=>{
    const pb=div({style:{flex:1,padding:"6px 8px",borderRadius:8,
      background:pi===0?"rgba(74,222,128,0.07)":"rgba(251,191,36,0.07)",
      border:`1px solid ${pi===0?"rgba(74,222,128,0.2)":"rgba(251,191,36,0.2)"}`}},[]);
    if(team.length===0)pb.appendChild(div({style:{fontSize:11,color:"#4b5563",fontStyle:"italic"}},["Empty team"]));
    else team.forEach(idx=>pb.appendChild(div({style:{fontSize:11,fontWeight:700,color:pcolor(idx),lineHeight:1.4}},[
      state.players[idx]?.name+(state.netEntryMode?"":" (cHCP "+courseHcps[idx]+")")
    ])));
    pairBoxes.appendChild(pb);
  });
  head.appendChild(pairBoxes);
  root.appendChild(head);

  const body=div({style:{padding:"8px 10px"}},[]);
  if(state.netEntryMode){
    body.appendChild(div({style:{marginBottom:6,padding:"5px 8px",background:"rgba(96,165,250,0.08)",borderRadius:6,border:"1px solid rgba(96,165,250,0.2)",textAlign:"center"}},[
      span({style:{fontSize:11,color:"#60a5fa",fontWeight:700}},["Entering NET scores per hole"])
    ]));
  }

  // Column headers
  const hdr=div({style:{display:"grid",gridTemplateColumns:cols,gap:3,marginBottom:4,padding:"0 2px"}},[
    span({style:{fontSize:9,color:"#6b8f6b",textAlign:"center",fontWeight:700}},["H"]),
    span({style:{fontSize:9,color:"#6b8f6b",textAlign:"center",fontWeight:700}},["PAR"]),
    ...t1.map(pi=>span({style:{fontSize:9,color:pcolor(pi),textAlign:"center",fontWeight:800}},[state.players[pi]?.name.split(" ")[0].slice(0,5)||"?"])),
    span({style:{fontSize:9,color:"#6b8f6b",textAlign:"center",fontWeight:700}},["RES"]),
    ...t2.map(pi=>span({style:{fontSize:9,color:pcolor(pi),textAlign:"center",fontWeight:800}},[state.players[pi]?.name.split(" ")[0].slice(0,5)||"?"])),
  ]);
  body.appendChild(hdr);

  // Build flat input list first so each input knows its index and neighbours
  // Entries: {el, pi, hi, isLastOnHole}
  // Order per hole: t1[0], t1[1]..., t2[0], t2[1]...
  // isLastOnHole = true for the last t2 player on each hole
  const allScoreInputs=[];
  // Pre-build all inputs then assign flatIdx after
  const holeInputData=[]; // [{h, t1Els, t2Els}]
  for(let hh=0;hh<18;hh++){
    // Placeholders — built below after allScoreInputs is assembled
    holeInputData.push({h:hh,t1Els:[],t2Els:[]});
  }
  // First pass: create all input elements without flatIdx (not known yet)
  // We'll use dummy scoreInput calls then fix up — actually easier to just
  // build the flat array structure first, then create inputs with correct indices.

  // Build entry list structure (pi, hi, isLastOnHole) in order
  const entryList=[];
  for(let hh=0;hh<18;hh++){
    t1.forEach((pi,ti)=>entryList.push({pi,hi:hh,isLastOnHole:false}));
    t2.forEach((pi,ti,arr)=>entryList.push({pi,hi:hh,isLastOnHole:ti===arr.length-1}));
  }
  // Now create inputs with correct flatIdx
  entryList.forEach((entry,idx)=>{
    const el=scoreInput(ri,entry.pi,entry.hi,idx,allScoreInputs,entry.isLastOnHole);
    allScoreInputs.push({el,pi:entry.pi,hi:entry.hi,isLastOnHole:entry.isLastOnHole});
  });

  // Helper to get input el for a given pi,hi
  function getInputEl(pi,hi){
    return allScoreInputs.find(e=>e.pi===pi&&e.hi===hi)?.el;
  }

  [0,1].forEach(half=>{
    for(let i=0;i<9;i++){
      const h=half*9+i;
      const hd=rd.holes[h];
      const bg=hd.result==="p1"?"rgba(74,222,128,0.06)":hd.result==="p2"?"rgba(251,191,36,0.06)":hd.result==="halve"?"rgba(148,163,184,0.04)":"transparent";
      const br=hd.result==="p1"?"rgba(74,222,128,0.15)":hd.result==="p2"?"rgba(251,191,36,0.15)":hd.result==="halve"?"rgba(148,163,184,0.1)":"transparent";

      const t1Inputs=t1.map(pi=>getInputEl(pi,h));
      const t2Inputs=t2.map(pi=>getInputEl(pi,h));

      const resultBadge=span({
        "data-result-badge":"",
        style:{fontSize:hd.result?"11px":"10px",fontWeight:hd.result?"800":"400",
          color:hd.result==="p1"?"#4ade80":hd.result==="p2"?"#fbbf24":hd.result==="halve"?"#94a3b8":"#2a3d2a"}
      },[hd.result?(hd.result==="halve"?"½":"W"):"·"]);
      const row=div({"data-hole-row":h,style:{display:"grid",gridTemplateColumns:cols,gap:3,padding:"3px 2px",borderRadius:6,marginBottom:2,background:bg,border:`1px solid ${br}`}},[
        div({style:{textAlign:"center",alignSelf:"center"}},[
          div({style:{fontSize:11,fontWeight:700,color:"#6b8f6b"}},[(h+1)+""]),
          ...(!state.netEntryMode?[div({style:{fontSize:8,color:"#4b5563"}},[r.hcpIdx[h]+""])]:[]),
        ]),
        div({style:{textAlign:"center",fontSize:12,fontWeight:700,color:"#9ab89a",alignSelf:"center"}},[r.pars[h]+""]),
        ...t1Inputs.map(inp=>div({style:{display:"flex",justifyContent:"center"}},[inp])),
        div({style:{textAlign:"center",alignSelf:"center"}},[resultBadge]),
        ...t2Inputs.map(inp=>div({style:{display:"flex",justifyContent:"center"}},[inp])),
      ]);
      body.appendChild(row);
    }
    // Subtotals
    const sub=div({style:{display:"grid",gridTemplateColumns:cols,gap:3,padding:"5px 2px 7px",borderRadius:6,background:"rgba(74,222,128,0.04)",border:"1px solid #2a3d2a",marginBottom:7}},[
      div({style:{gridColumn:"1/3",textAlign:"center",fontSize:11,fontWeight:800,color:"#6b8f6b",alignSelf:"center"}},[half===0?"OUT":"IN"]),
    ]);
    [t1,t2].forEach(team=>{
      team.forEach(pi=>{
        const sl=state.scores[ri]?.[pi]?.slice(half*9,half*9+9)||[];
        const gross=sl.reduce((s,v)=>s+(parseInt(v)||0),0);
        const net=state.netEntryMode?gross:sl.reduce((s,v,i)=>{const n=getNet(ri,pi,half*9+i);return n!==null?s+n:s;},0);
        const has=sl.some(v=>v!=="");
        const grossSpan=el("span",{},[has?gross+"":"—"]);
        const netSpan=el("span",{style:{fontSize:8,color:"#6b8f6b"}},[has&&!state.netEntryMode?"("+net+")":""]);
        sub.appendChild(div({"data-subtotal":"player","data-subtotal-half":half,"data-subtotal-pi":pi,
          style:{textAlign:"center",fontSize:12,fontWeight:800,color:"#e8f5e8",alignSelf:"center"}},[grossSpan,netSpan]));
      });
      if(team===t1){
        const p1h=rd.holes.slice(half*9,half*9+9).filter(h=>h.result==="p1").length;
        const p2h=rd.holes.slice(half*9,half*9+9).filter(h=>h.result==="p2").length;
        sub.appendChild(div({"data-subtotal":"split","data-subtotal-half":half,
          style:{textAlign:"center",fontSize:11,fontWeight:700,color:"#6b8f6b",alignSelf:"center"}},[p1h+"-"+p2h]));
      }
    });
    body.appendChild(sub);
  });

  // Match summary
  const summary=div({style:{padding:"12px",background:"rgba(74,222,128,0.05)",borderRadius:12,border:"1px solid #2a3d2a"}},[]);
  summary.appendChild(div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},[
    span({style:{fontSize:11,fontWeight:700,color:"#6b8f6b"}},["MATCH RESULT"]),
    span({"data-summary-status":"",style:{fontSize:13,fontWeight:800,color:sColor}},[sLabel]),
  ]));
  const sg=div({style:{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:8,alignItems:"center"}},[]);
  [[t1,"#4ade80",rd.p1w,rd.p1diff,"p1"],[t2,"#fbbf24",rd.p2w,rd.p2diff,"p2"]].forEach(([team,col,won,pdiff,side],pi)=>{
    const diffSpan=span({"data-summary-diff":side,style:{color:pdiff===null?"#4b5563":pdiff<0?"#4ade80":pdiff===0?"#9ab89a":"#f97316",fontWeight:700,fontSize:11}},
      [pdiff===null?"—":(pdiff>0?"+":"")+pdiff]);
    sg.appendChild(div({style:{textAlign:"center"}},[
      div({style:{fontSize:11,color:col,marginBottom:2}},[team.map(i=>state.players[i]?.name.split(" ")[0]||"?").join(" & ")||"(empty)"]),
      div({"data-summary-won":side,style:{fontSize:22,fontWeight:900,color:col,lineHeight:1}},[won+""]),
      div({style:{fontSize:11,color:"#6b8f6b",marginTop:2}},[diffSpan," net"]),
    ]));
    if(pi===0)sg.appendChild(div({style:{textAlign:"center"}},[
      div({style:{fontSize:12,color:"#4b5563"}},["vs"]),
      div({"data-summary-halves":"",style:{fontSize:10,color:"#4b5563",marginTop:2}},[rd.halves+" halved"]),
    ]));
  });
  summary.appendChild(sg);
  body.appendChild(summary);
  root.appendChild(body);
  return root;
}
function refreshScorecard(focusPi,focusHi){
  if(state.screen!=="scorecard"||!scorecardRoot)return;
  const inner=scorecardRoot.querySelector("div");
  if(!inner)return;
  inner.innerHTML="";
  inner.appendChild(buildScorecardContent(state.activeRound));
  // Re-focus after rebuild if coords provided (used after last player on a hole)
  if(focusPi!==undefined&&focusPi!==null){
    const target=inner.querySelector(`[data-pi="${focusPi}"][data-hi="${focusHi}"]`);
    if(target){target.focus();target.select();}
  }
}

// ─── Reset ────────────────────────────────────────────────────────────────────
async function doReset(){
  try{localStorage.removeItem(STORAGE_KEY);}catch(e){}
  // Clear Firebase too
  try{await fetch(FB_URL,{method:"PUT",headers:{"Content-Type":"application/json"},body:"null"});}catch(e){}
  state.players=[{name:"Player 1",handicap:"10.4"},{name:"Player 2",handicap:"14.2"},{name:"Player 3",handicap:"8.1"},{name:"Player 4",handicap:"18.7"}];
  state.rounds=[mkRound(1),mkRound(2),mkRound(3)];
  state.scores=[mkScoresForRound(),mkScoresForRound(),mkScoresForRound()];
  state.screen="setup";state.setupStep=0;state.saveStatus="idle";
  state.netEntryMode=false;state.useSlopeRating=true;
  renderApp();
}
function showQRModal(url){
  const overlay=div({className:"modal-overlay"},[]);
  const box=div({className:"modal-box"},[]);
  box.appendChild(div({style:{fontSize:15,fontWeight:800,color:"#4ade80",marginBottom:4}},["⛳ Share Scorer"]));
  box.appendChild(div({style:{fontSize:11,color:"#6b8f6b",marginBottom:16}},["Share with your group — everyone sees the same live scores"]));
  // QR code via free qrserver.com API (no account needed)
  const qrSize=200;
  const qrUrl="https://api.qrserver.com/v1/create-qr-code/?size="+qrSize+"x"+qrSize+"&data="+encodeURIComponent(url)+"&bgcolor=1c2a1c&color=4ade80&margin=10";
  const img=el("img",{src:qrUrl,width:qrSize,height:qrSize,style:{borderRadius:10,display:"block",margin:"0 auto 14px"}});
  box.appendChild(img);
  // Copyable URL
  const urlBox=div({style:{background:"rgba(255,255,255,0.04)",border:"1px solid #2a3d2a",borderRadius:8,
    padding:"8px 10px",marginBottom:14,wordBreak:"break-all",fontSize:11,color:"#6b8f6b",textAlign:"left"}},[url]);
  box.appendChild(urlBox);
  // Copy button
  const copyBtn=btn({style:{width:"100%",padding:"10px",borderRadius:8,border:"1px solid rgba(74,222,128,0.3)",
    background:"rgba(74,222,128,0.08)",color:"#4ade80",fontSize:13,fontWeight:700,marginBottom:10},
    onClick:()=>{
      navigator.clipboard.writeText(url).then(()=>{
        copyBtn.textContent="✓ Copied!";
        setTimeout(()=>{copyBtn.textContent="Copy URL";},2000);
      }).catch(()=>{
        // Fallback for older iOS
        copyBtn.textContent="Copy link above";
      });
    }},["Copy URL"]);
  box.appendChild(copyBtn);
  box.appendChild(btn({style:{width:"100%",padding:"10px",borderRadius:8,border:"1px solid #2a3d2a",
    color:"#6b8f6b",fontSize:13,fontWeight:700},
    onClick:()=>overlay.remove()},["Close"]));
  overlay.appendChild(box);
  overlay.addEventListener("click",e=>{if(e.target===overlay)overlay.remove();});
  document.body.appendChild(overlay);
}

function showConfirmModal(message,onConfirm){
  const overlay=div({className:"modal-overlay"},[]);
  const box=div({className:"modal-box"},[]);
  box.appendChild(div({style:{fontSize:22,marginBottom:12}},["⚠️"]));
  box.appendChild(div({style:{fontSize:15,fontWeight:700,color:"#e8f5e8",marginBottom:8}},[message]));
  box.appendChild(div({style:{fontSize:12,color:"#6b8f6b",marginBottom:20}},["Clears all players, scores, pars, handicaps & round setup. Cannot be undone."]));
  const btnRow=div({style:{display:"flex",gap:10}},[]);
  btnRow.appendChild(btn({style:{flex:1,padding:"12px",borderRadius:10,border:"1px solid #2a3d2a",
    color:"#6b8f6b",fontSize:14,fontWeight:700},
    onClick:()=>overlay.remove()},["Cancel"]));
  btnRow.appendChild(btn({style:{flex:1,padding:"12px",borderRadius:10,border:"none",
    background:"rgba(239,68,68,0.2)",color:"#f87171",fontSize:14,fontWeight:800},
    onClick:()=>{overlay.remove();onConfirm();}},["Reset"]));
  box.appendChild(btnRow);
  overlay.appendChild(box);
  overlay.addEventListener("click",e=>{if(e.target===overlay)overlay.remove();});
  document.body.appendChild(overlay);
}
function handleReset(){
  showConfirmModal("Reset entire tournament?",doReset);
}

// ─── Main ─────────────────────────────────────────────────────────────────────
function renderApp(){
  const app=document.getElementById("app");
  app.innerHTML="";
  let content;
  if(state.screen==="setup")content=renderSetup();
  else if(state.screen==="scorecard")content=renderScorecard();
  else content=renderHome();
  app.appendChild(content);
  renderSaveStatus();
}
// Show a loading screen while Firebase data loads
(async()=>{
  // Render immediately with localStorage data (fast, works offline)
  renderApp();
  // Then load from Firebase and re-render with latest shared data
  await loadState();
  renderApp();
})();
</script>
